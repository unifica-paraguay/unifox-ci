name: Auto Release Proposal

on:
  push:
    branches:
      - main

jobs:
  propose:
    name: Analyze and propose release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      proposed_tag: ${{ steps.proposal.outputs.proposed_tag }}
      pr_number: ${{ steps.proposal.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: proposal
        uses: ./actions/release-proposal
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          tag_prefix: semver
          base_branch: main

  release:
    name: Create release ${{ needs.propose.outputs.proposed_tag }}
    needs: propose
    if: needs.propose.result == 'success' && needs.propose.outputs.proposed_tag != ''
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://github.com/unifica-paraguay/unifox-ci/releases/tag/${{ needs.propose.outputs.proposed_tag }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UNIFOX_CI_APP_ID }}
          private-key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}

      - name: Warn if bot token unavailable
        shell: bash
        env:
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "WARNING: GitHub App token unavailable — release will be created as github-actions[bot]"
            echo "Fix: install the unifox-ci GitHub App on this repository (GitHub Settings → Apps)."
          else
            echo "Token: using GitHub App (unifox-ci[bot])"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./actions/release-tag
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          tag_prefix: semver
          base_branch: main
          dry_run: "false"

      - name: Update PR comment
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}
          PR_NUMBER: ${{ needs.propose.outputs.pr_number }}
          PROPOSED_TAG: ${{ needs.propose.outputs.proposed_tag }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          repo      = os.environ['REPO']
          pr_number = os.environ['PR_NUMBER']
          run_url   = os.environ['RUN_URL']
          gh_token  = os.environ['GH_TOKEN']
          env       = {**os.environ, 'GH_TOKEN': gh_token}

          if not pr_number:
              print('No PR number — skipping comment update')
              sys.exit(0)

          # Read the actual tag created (may differ from proposed if Claude re-analyzed)
          try:
              tag = json.load(open('/tmp/release_parsed.json'))['new_tag']
          except FileNotFoundError:
              tag = os.environ['PROPOSED_TAG']

          release_url = f'https://github.com/{repo}/releases/tag/{tag}'

          # Find the proposal comment by its HTML marker
          comments_r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/issues/{pr_number}/comments', '--paginate'],
              capture_output=True, text=True, env=env,
          )
          if comments_r.returncode != 0:
              print(f"Failed to fetch comments: {comments_r.stderr.strip()}")
              sys.exit(1)
          comments = json.loads(comments_r.stdout or '[]')
          proposal = next(
              (c for c in comments if '<!-- unifox-release-proposal -->' in c.get('body', '')),
              None,
          )

          body_parts = [
              '<!-- unifox-release-proposal -->',
              '',
              '\U0001f98a unifox-ci \u2014 Release Published',
              '',
              f'\u2705 **[{tag}]({release_url}) was successfully released.**',
              '',
              f'Approved and created by unifox-ci \u2014 [View run]({run_url})',
          ]
          new_body = '\n'.join(body_parts)

          if proposal:
              subprocess.run([
                  'gh', 'api', '--method', 'PATCH',
                  f"repos/{repo}/issues/comments/{proposal['id']}",
                  '-f', f'body={new_body}',
              ], env=env, check=True)
              print(f"Updated proposal comment on PR #{pr_number}")
          else:
              print('Proposal comment not found — skipping update')
          PYEOF
