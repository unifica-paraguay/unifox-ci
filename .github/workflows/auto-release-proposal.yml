name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Tag and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UNIFOX_CI_APP_ID }}
          private-key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}

      - name: Require app token
        shell: bash
        env:
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$BOT_TOKEN" ]; then
            echo "Token: using GitHub App (unifox-ci[bot])"
            exit 0
          fi
          ORG="${REPO%%/*}"
          echo "ERROR: unifox-ci GitHub App is not installed on this repository."
          echo "Install it at https://github.com/apps/unifox-ci"
          echo "or enable it at https://github.com/organizations/${ORG}/settings/installations"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - id: tag
        uses: ./actions/release-tag
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          tag_prefix: semver
          base_branch: main
          dry_run: "false"

      - name: Update PR proposal comment
        shell: bash
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          repo     = os.environ['REPO']
          sha      = os.environ['SHA']
          run_url  = os.environ['RUN_URL']
          gh_token = os.environ['GH_TOKEN']
          env      = {**os.environ, 'GH_TOKEN': gh_token}

          # Read the tag created by release-tag
          try:
              tag = json.load(open('/tmp/release_parsed.json'))['new_tag']
          except (FileNotFoundError, KeyError):
              print("ERROR: could not read new_tag from /tmp/release_parsed.json")
              sys.exit(1)

          release_url = f'https://github.com/{repo}/releases/tag/{tag}'

          # Find the PR associated with this merge commit
          pr_r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/commits/{sha}/pulls',
               '--header', 'Accept: application/vnd.github.v3+json'],
              capture_output=True, text=True, env=env,
          )
          pr_number = ''
          if pr_r.returncode == 0:
              try:
                  prs = json.loads(pr_r.stdout or '[]')
                  matching = [p for p in prs if p.get('base', {}).get('ref') == 'main']
                  pr_number = str((matching or prs[:1] or [{}])[0].get('number', ''))
              except (json.JSONDecodeError, IndexError):
                  pass

          if not pr_number:
              print('No associated PR found — skipping comment update')
              sys.exit(0)

          # Find and update the proposal comment
          comments_r = subprocess.run(
              ['gh', 'api', f'repos/{repo}/issues/{pr_number}/comments', '--paginate'],
              capture_output=True, text=True, env=env,
          )
          if comments_r.returncode != 0:
              print(f'Warning: could not fetch PR comments: {comments_r.stderr.strip()}')
              sys.exit(0)

          try:
              comments = json.loads(comments_r.stdout or '[]')
          except json.JSONDecodeError:
              sys.exit(0)

          proposal = next(
              (c for c in comments if '<!-- unifox-release-proposal -->' in c.get('body', '')),
              None,
          )

          new_body = '\n'.join([
              '<!-- unifox-release-proposal -->',
              '',
              '\U0001f98a unifox-ci \u2014 Release Published',
              '',
              f'\u2705 **[{tag}]({release_url}) was successfully released.**',
              '',
              f'_[View run]({run_url})_',
          ])

          if proposal:
              import tempfile
              from pathlib import Path
              tmp = tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False)
              try:
                  json.dump({'body': new_body}, tmp)
                  tmp.flush()
                  tmp.close()
                  subprocess.run([
                      'gh', 'api', '--method', 'PATCH',
                      f"repos/{repo}/issues/comments/{proposal['id']}",
                      '--input', tmp.name,
                  ], env=env, check=True)
              finally:
                  Path(tmp.name).unlink(missing_ok=True)
              print(f'Updated proposal comment on PR #{pr_number} → {tag}')
          else:
              print(f'No proposal comment found on PR #{pr_number} — skipping')
          PYEOF
