name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-enrich:
    name: AI Enrichment & Review
    uses: ./.github/workflows/reusable-pr-ai-enrich.yml
    with:
      profile: default
    secrets: inherit
