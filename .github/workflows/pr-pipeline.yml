name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-pipeline-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write    # needed by version-bump job (commits to PR branch)
  pull-requests: write
  issues: write

jobs:
  ai-enrich:
    name: AI Enrichment & Review
    uses: ./.github/workflows/reusable-pr-ai-enrich.yml
    with:
      profile: default
      enable_release_preview: true
    secrets: inherit
