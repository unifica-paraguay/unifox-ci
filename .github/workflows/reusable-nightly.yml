name: "[Reusable] Nightly Tests"

# Full Odoo test suite — Layer 3. Run this on a schedule from your repo:
#
#   on:
#     schedule:
#       - cron: '0 2 * * *'   # 02:00 UTC = 23:00 Paraguay time
#   jobs:
#     nightly:
#       uses: unifica-paraguay/unifox-ci/.github/workflows/reusable-nightly.yml@v1
#       secrets: inherit
#
# On failure: opens a GitHub issue with the failed modules and log excerpt.
# On success: silent.

on:
  workflow_call:
    inputs:
      profile:
        description: "Repository profile — only 'odoo' runs tests; others are skipped"
        type: string
        default: "odoo"

jobs:
  odoo-tests-layer3:
    name: Tests — Layer 3 (full nightly suite)
    if: ${{ inputs.profile == 'odoo' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/odoo-tests-layer3@v1
        with:
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
