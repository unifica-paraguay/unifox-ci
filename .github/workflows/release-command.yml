name: Release Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  handle-command:
    name: Handle /release command
    if: >-
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/release') &&
      contains(join(github.event.issue.labels.*.name, ','), 'release-proposal')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./actions/release-command
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          tag_prefix: semver
          base_branch: main
          issue_number: ${{ github.event.issue.number }}
          comment_id: ${{ github.event.comment.id }}
          comment_body: ${{ github.event.comment.body }}
          commenter: ${{ github.event.comment.user.login }}
