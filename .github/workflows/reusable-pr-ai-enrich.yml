name: "[Reusable] PR AI Enrichment"

# Centralised PR enrichment + code review for any repo in the org.
# Call this from your repo's pr-pipeline.yml with:
#
#   jobs:
#     ai-enrich:
#       uses: unifica-paraguay/unifox-ci/.github/workflows/reusable-pr-ai-enrich.yml@v1
#       with:
#         profile: auto   # auto-detects: odoo | react | astro | python | node | default
#       secrets: inherit
#
# Profiles: odoo | react | astro | python | node | default | auto (default)
# 'auto' detects the framework from repository contents automatically.

on:
  workflow_call:
    inputs:
      profile:
        description: "unifox-ci review profile (odoo/react/astro/python/node/default/auto)"
        type: string
        default: "auto"
      enable_security_scan:
        description: "Run the security scan job"
        type: boolean
        default: true
      enable_labels:
        description: "Auto-assign PR labels"
        type: boolean
        default: true
      fail_on_security_critical:
        description: "Block merge on critical security findings"
        type: boolean
        default: true

jobs:
  # -------------------------------------------------------------------------
  # Verify the unifox-ci App token exactly once before running parallel jobs.
  # Prevents all jobs from posting the same "not installed" comment.
  # -------------------------------------------------------------------------
  pre-flight:
    name: Verify App token
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate app token
        id: gen-token
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UNIFOX_CI_APP_ID }}
          private-key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}

      - name: Require app token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.gen-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            echo "Token: using GitHub App (unifox-ci[bot])"
            exit 0
          fi
          ORG="${REPO%%/*}"
          INSTALL_URL="https://github.com/apps/unifox-ci"
          SETTINGS_URL="https://github.com/organizations/${ORG}/settings/installations"
          MSG=$(printf '%s\n\n%s\n\n**To fix:** [Install unifox-ci →](%s)\nOr enable it for this repo in your [organization app settings](%s).\n\nOnce installed, re-run this workflow.' \
            '## ⚠️ unifox-ci not installed' \
            'This workflow requires the **unifox-ci** GitHub App. Without it, CI cannot post review comments or enrichments on this repository.' \
            "$INSTALL_URL" "$SETTINGS_URL")
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$MSG" || true
          echo "ERROR: unifox-ci GitHub App is not installed — install it to unblock CI."
          exit 1

  # -------------------------------------------------------------------------
  # NOTE: composite actions below are fetched at @claude/improve-bot-testing-q5hXf
  # so this feature branch tests its own code.
  # When merging to main: revert all @claude/... refs back to @v1 and advance
  # the v1 tag to the new main HEAD (git tag -f v1 HEAD && git push --force-tags).
  # -------------------------------------------------------------------------

  enrich-metadata:
    name: Update title & description
    needs: pre-flight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-enrich@claude/improve-bot-testing-q5hXf
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
          event_action: ${{ github.event.action }}
          profile: ${{ inputs.profile }}

  ai-code-review:
    name: AI code review
    # Serialised after enrich to avoid Anthropic rate-limit collisions.
    # enrich + review together = 2 Claude calls per push, spaced apart.
    needs: [pre-flight, enrich-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-review@claude/improve-bot-testing-q5hXf
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
          profile: ${{ inputs.profile }}

  security-scan:
    name: Security scan
    needs: pre-flight
    if: ${{ inputs.enable_security_scan }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-security-scan@claude/improve-bot-testing-q5hXf
        with:
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
          fail_on_critical: ${{ inputs.fail_on_security_critical }}

  auto-labels:
    name: Auto-assign labels
    needs: pre-flight
    if: ${{ inputs.enable_labels }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-labels@claude/improve-bot-testing-q5hXf
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
