name: "[Reusable] PR AI Enrichment"

# Centralised PR enrichment + code review for any repo in the org.
# Call this from your repo's pr-pipeline.yml with:
#
#   jobs:
#     ai-enrich:
#       uses: unifica-paraguay/unifox-ci/.github/workflows/reusable-pr-ai-enrich.yml@v1
#       with:
#         profile: odoo   # or 'default'
#       secrets: inherit

on:
  workflow_call:
    inputs:
      profile:
        description: "unifox-ci review profile (e.g. 'odoo', 'default')"
        type: string
        default: "default"

permissions:
  contents: read
  pull-requests: write

jobs:
  # Verify the unifox-ci App token exactly once before running the parallel jobs.
  # This prevents both enrich-metadata and ai-code-review from each posting the
  # same "not installed" comment when the App is absent.
  pre-flight:
    name: Verify App token
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: gen-token
        # continue-on-error is intentional: the following step needs to run when
        # token generation fails so it can post the install instructions and exit 1.
        continue-on-error: true
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.UNIFOX_CI_APP_ID }}
          private-key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}

      - name: Require app token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.gen-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            echo "Token: using GitHub App (unifox-ci[bot])"
            exit 0
          fi
          ORG="${REPO%%/*}"
          INSTALL_URL="https://github.com/apps/unifox-ci"
          SETTINGS_URL="https://github.com/organizations/${ORG}/settings/installations"
          MSG=$(printf '## ⚠️ unifox-ci not installed\n\nThis workflow requires the **unifox-ci** GitHub App. Without it, CI cannot post review comments or enrichments on this repository.\n\n**To fix:** [Install unifox-ci →](%s)\nOr enable it for this repo in your [organization app settings](%s).\n\nOnce installed, re-run this workflow.' "$INSTALL_URL" "$SETTINGS_URL")
          # || true is intentional: a failure to post the helpful comment must not
          # mask the real error. The exit 1 below is what actually fails the job.
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$MSG" || true
          echo "ERROR: unifox-ci GitHub App is not installed — install it to unblock CI."
          exit 1

  # NOTE: composite actions below are always fetched at @v1 from the unifox-ci repo.
  # GitHub Actions does not support expressions in `uses:`, so there is no way to
  # pass a dynamic ref. Consequence: changes to actions/pr-enrich or actions/pr-review
  # on a feature branch are NOT exercised by the local pipeline until the v1 tag is
  # advanced to that commit. Advance v1 after every push to keep the tag in sync.
  enrich-metadata:
    name: Update title & description
    needs: pre-flight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-enrich@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
          event_action: ${{ github.event.action }}
          profile: ${{ inputs.profile }}

  ai-code-review:
    name: AI code review
    needs: pre-flight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: unifica-paraguay/unifox-ci/actions/pr-review@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          unifox_app_id: ${{ secrets.UNIFOX_CI_APP_ID }}
          unifox_private_key: ${{ secrets.UNIFOX_CI_PRIVATE_KEY }}
          base_branch: ${{ github.base_ref }}
          profile: ${{ inputs.profile }}
