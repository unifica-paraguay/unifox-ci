name: "unifox-ci: PR Auto Labels"
description: >
  Automatically assigns labels to a PR based on: PR size (XS/S/M/L/XL),
  change type (feature/fix/docs/ci/test/refactor), and affected areas.
  Creates labels if they do not exist. Updates existing labels on re-runs.

inputs:
  unifox_app_id:
    description: "unifox-ci GitHub App ID"
    required: true
  unifox_private_key:
    description: "unifox-ci GitHub App private key"
    required: true
  base_branch:
    description: "Base branch of the repository"
    required: false
    default: "main"

runs:
  using: "composite"
  steps:
    - name: Generate app token
      id: gen-token
      continue-on-error: true
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.unifox_app_id }}
        private-key: ${{ inputs.unifox_private_key }}

    - name: Resolve token
      id: token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.gen-token.outputs.token }}
        FALLBACK_TOKEN: ${{ github.token }}
      run: echo "value=${APP_TOKEN:-$FALLBACK_TOKEN}" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Compute and apply labels
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BRANCH: ${{ github.head_ref }}
      run: |
        python3 - <<'PYEOF'
        import json, os, re, subprocess
        from pathlib import Path

        repo      = os.environ['REPO']
        pr        = os.environ['PR_NUMBER']
        base      = os.environ['BASE_BRANCH']
        pr_title  = os.environ.get('PR_TITLE', '')
        pr_branch = os.environ.get('PR_BRANCH', '')

        # ------------------------------------------------------------------ #
        # Helpers
        # ------------------------------------------------------------------ #
        def gh(endpoint, body=None, method='GET'):
            cmd = ['gh', 'api']
            if method != 'GET':
                cmd += ['--method', method]
            if body is not None:
                cmd += ['--input', '-']
            cmd.append(endpoint)
            kw = {'capture_output': True, 'text': True}
            if body is not None:
                kw['input'] = json.dumps(body)
            r = subprocess.run(cmd, **kw)
            return r

        def ensure_label(name, color, description=''):
            """Create label if it does not exist; silently pass if it does."""
            r = gh(f'repos/{repo}/labels', body={
                'name': name, 'color': color, 'description': description
            }, method='POST')
            # 422 = already exists, which is fine
            if r.returncode != 0 and '422' not in r.stderr:
                print(f'Warning: could not create label "{name}": {r.stderr[:80]}')

        # ------------------------------------------------------------------ #
        # 1. PR size label
        # ------------------------------------------------------------------ #
        diff_stat = subprocess.run(
            ['git', 'diff', '--stat', f'origin/{base}...HEAD'],
            capture_output=True, text=True,
        ).stdout

        summary = diff_stat.strip().split('\n')[-1] if diff_stat.strip() else ''
        ins  = sum(int(x) for x in re.findall(r'(\d+) insertion', summary))
        dels = sum(int(x) for x in re.findall(r'(\d+) deletion', summary))
        total_lines = ins + dels

        SIZE_MAP = [
            (0,    50,   'size: XS',  'b2dfdb', 'Extra-small PR (< 50 lines)'),
            (50,   200,  'size: S',   '86d18e', 'Small PR (50-200 lines)'),
            (200,  500,  'size: M',   'fbca04', 'Medium PR (200-500 lines)'),
            (500,  1000, 'size: L',   'f99b2e', 'Large PR (500-1000 lines)'),
            (1000, 9999, 'size: XL',  'e11d48', 'Very large PR (> 1000 lines)'),
        ]
        size_label = 'size: XL'
        for lo, hi, name, color, desc in SIZE_MAP:
            if lo <= total_lines < hi:
                size_label = name
                size_color = color
                size_desc  = desc
                break
        else:
            size_color = 'e11d48'
            size_desc  = 'Very large PR (> 1000 lines)'

        # ------------------------------------------------------------------ #
        # 2. Change type label from [TAG] in title or branch name
        # ------------------------------------------------------------------ #
        TAG_TO_LABEL = {
            'ADD':   ('type: feature',  'a2eeef', 'New feature or capability'),
            'IMP':   ('type: feature',  'a2eeef', 'Improvement to existing feature'),
            'FIX':   ('type: fix',      'd73a4a', 'Bug fix'),
            'UPD':   ('type: update',   '0075ca', 'Dependency or data update'),
            'REF':   ('type: refactor', 'cfd3d7', 'Code refactor, no behavior change'),
            'CLN':   ('type: refactor', 'cfd3d7', 'Cleanup / chore'),
            'LINT':  ('type: chore',    'cfd3d7', 'Lint / formatting only'),
            'PERF':  ('type: perf',     '00b4d8', 'Performance improvement'),
            'REM':   ('type: chore',    'cfd3d7', 'Removal of code or files'),
            'MOV':   ('type: chore',    'cfd3d7', 'File move / rename'),
            'REL':   ('type: release',  '0e8a16', 'Release commit'),
            'I18N':  ('type: i18n',     'bfd4f2', 'Internationalization'),
            'CLA':   ('type: legal',    'e4e669', 'CLA or license'),
            'MERGE': ('type: merge',    'cfd3d7', 'Merge commit'),
            'REV':   ('type: revert',   'b60205', 'Revert a previous commit'),
        }

        tag_match = re.match(r'^\[([A-Z]+)\]', pr_title)
        type_label_info = None
        if tag_match:
            tag = tag_match.group(1).upper()
            type_label_info = TAG_TO_LABEL.get(tag)

        # ------------------------------------------------------------------ #
        # 3. Area labels from changed files
        # ------------------------------------------------------------------ #
        changed_files = subprocess.run(
            ['git', 'diff', '--name-only', f'origin/{base}...HEAD'],
            capture_output=True, text=True,
        ).stdout.strip().splitlines()

        area_labels = set()
        for f in changed_files:
            p = Path(f)
            parts = p.parts
            if not parts:
                continue
            # CI/CD
            if '.github' in parts or 'Dockerfile' in p.name or 'docker-compose' in p.name:
                area_labels.add(('area: ci/cd', 'e4e669', 'Changes to CI/CD pipeline'))
            # Tests
            if 'tests' in parts or p.name.startswith('test_') or p.stem.endswith('.test') or p.stem.endswith('.spec'):
                area_labels.add(('area: tests', 'bfd4f2', 'Test additions or changes'))
            # Docs
            if p.suffix in ('.md', '.rst', '.mdx') or 'docs' in parts:
                area_labels.add(('area: docs', '0075ca', 'Documentation changes'))
            # Frontend
            if p.suffix in ('.tsx', '.jsx', '.astro', '.css', '.scss'):
                area_labels.add(('area: frontend', 'ff6b6b', 'Frontend / UI changes'))
            # Backend / API
            if any(kw in str(f).lower() for kw in ('api', 'routes', 'controllers', 'views', 'endpoints')):
                area_labels.add(('area: api', 'ffd166', 'API / routes changes'))
            # Security
            if any(kw in str(f).lower() for kw in ('auth', 'security', 'permissions', 'access', 'token')):
                area_labels.add(('area: security', 'b60205', 'Authentication / security changes'))

        # ------------------------------------------------------------------ #
        # 4. Ensure labels exist and apply them
        # ------------------------------------------------------------------ #
        labels_to_apply = []

        ensure_label(size_label, size_color, size_desc)
        labels_to_apply.append(size_label)

        # Remove old size labels before applying new one
        current_labels_r = gh(f'repos/{repo}/issues/{pr}/labels')
        current_labels = []
        if current_labels_r.returncode == 0:
            try:
                current_labels = [l['name'] for l in json.loads(current_labels_r.stdout)]
            except Exception:
                pass
        for old in current_labels:
            if old.startswith('size: ') and old != size_label:
                gh(f'repos/{repo}/issues/{pr}/labels/{old.replace(" ", "%20")}', method='DELETE')

        if type_label_info:
            name, color, desc = type_label_info
            ensure_label(name, color, desc)
            labels_to_apply.append(name)

        for name, color, desc in area_labels:
            ensure_label(name, color, desc)
            labels_to_apply.append(name)

        # Deduplicate and skip labels already present
        new_labels = [l for l in labels_to_apply if l not in current_labels]
        if new_labels:
            gh(f'repos/{repo}/issues/{pr}/labels',
               body={'labels': new_labels}, method='POST')
            print(f'Applied labels: {new_labels}')
        else:
            print(f'Labels already up to date: {labels_to_apply}')

        if size_label in current_labels:
            print(f'Size label unchanged: {size_label}')
        PYEOF
