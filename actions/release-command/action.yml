name: "unifox-ci: Release Command"
description: >
  Handles /release commands posted as comments on release-proposal issues.
  Verifies write-access permission, then routes to confirm / cancel /
  re-analyze handlers.

inputs:
  anthropic_api_key:
    description: "Anthropic API key"
    required: true
  unifox_app_id:
    description: "unifox-ci GitHub App ID"
    required: true
  unifox_private_key:
    description: "unifox-ci GitHub App private key"
    required: true
  tag_prefix:
    description: "Tag style: 'semver' or 'odoo'"
    required: false
    default: "semver"
  odoo_version:
    description: "Odoo major branch (e.g. '19.0'). Only used when tag_prefix=odoo."
    required: false
    default: "19.0"
  base_branch:
    description: "Branch being released"
    required: false
    default: "main"
  issue_number:
    description: "Issue number of the release proposal"
    required: true
  comment_id:
    description: "ID of the comment containing the /release command"
    required: true
  comment_body:
    description: "Body of the comment containing the /release command"
    required: true
  commenter:
    description: "GitHub login of the user who posted the command"
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate app token
      id: gen-token
      continue-on-error: true
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.unifox_app_id }}
        private-key: ${{ inputs.unifox_private_key }}

    - name: Resolve token
      id: token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.gen-token.outputs.token }}
        FALLBACK_TOKEN: ${{ github.token }}
      run: echo "value=${APP_TOKEN:-$FALLBACK_TOKEN}" >> "$GITHUB_OUTPUT"

    - name: Verify permissions and parse command
      id: parse
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        COMMENTER: ${{ inputs.commenter }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        COMMENT_ID: ${{ inputs.comment_id }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        python3 - <<'PYEOF'
        import json, os, re, subprocess, sys

        repo         = os.environ['REPO']
        commenter    = os.environ['COMMENTER']
        comment_body = os.environ['COMMENT_BODY']
        comment_id   = os.environ['COMMENT_ID']
        issue_number = os.environ['ISSUE_NUMBER']
        gh_token     = os.environ['GH_TOKEN']
        env          = {**os.environ, 'GH_TOKEN': gh_token}

        def post_comment(body):
            subprocess.run(['gh', 'issue', 'comment', issue_number,
                            '--repo', repo, '--body', body], env=env, check=True)

        def react(content):
            subprocess.run([
                'gh', 'api', f'repos/{repo}/issues/comments/{comment_id}/reactions',
                '-X', 'POST', '-f', f'content={content}',
            ], env=env, capture_output=True)

        def write_outputs(**kwargs):
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                for k, v in kwargs.items():
                    f.write(f'{k}={v}\n')

        # --- Permission check ---
        perm_r = subprocess.run(
            ['gh', 'api', f'repos/{repo}/collaborators/{commenter}/permission',
             '--jq', '.permission'],
            capture_output=True, text=True, env=env,
        )
        perm = perm_r.stdout.strip() if perm_r.returncode == 0 else 'none'

        if perm not in ('admin', 'write'):
            post_comment(
                f'\u26d4 @{commenter} Only maintainers with write access can execute release commands.'
            )
            write_outputs(authorized='false')
            sys.exit(0)

        # --- Parse command ---
        command    = None
        found_line = ''
        for line in comment_body.splitlines():
            stripped = line.strip()
            if stripped.startswith('/release'):
                found_line = stripped
                parts      = stripped.split()
                command    = parts[1] if len(parts) >= 2 else ''
                break

        valid = ('confirm', 'cancel', 're-analyze')
        if command not in valid:
            post_comment(
                f'\u2753 Unknown command `{found_line}`. '
                'Available: `/release confirm`, `/release cancel`, `/release re-analyze`'
            )
            write_outputs(authorized='false')
            sys.exit(0)

        # --- React 👀 to acknowledge ---
        react('eyes')

        # --- Extract metadata from issue body ---
        body_r = subprocess.run(
            ['gh', 'issue', 'view', issue_number, '--repo', repo,
             '--json', 'body', '--jq', '.body'],
            capture_output=True, text=True, env=env,
        )
        issue_body   = body_r.stdout.strip()
        branch_m     = re.search(r'<!-- branch: (.+?) -->', issue_body)
        tag_m        = re.search(r'<!-- proposed-tag: (.+?) -->', issue_body)
        extr_branch  = branch_m.group(1).strip() if branch_m else ''
        proposed_tag = tag_m.group(1).strip() if tag_m else ''

        write_outputs(
            authorized='true',
            command=command,
            proposed_tag=proposed_tag,
            extracted_branch=extr_branch,
        )
        print(f'Command: {command}  Proposed tag: {proposed_tag}  Branch: {extr_branch}')
        PYEOF

    # ========================
    # CONFIRM path
    # ========================

    - name: Post creating comment (confirm)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 'confirm' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        PROPOSED_TAG: ${{ steps.parse.outputs.proposed_tag }}
      run: |
        gh issue comment "$ISSUE_NUMBER" \
          --repo "$REPO" \
          --body $'⚙️ Creating release `'"$PROPOSED_TAG"$'` (re-analyzing current commits)...'

    - name: Execute release (confirm)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 'confirm' }}
      id: do-release
      continue-on-error: true
      uses: unifica-paraguay/unifox-ci/actions/release-tag@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        unifox_app_id: ${{ inputs.unifox_app_id }}
        unifox_private_key: ${{ inputs.unifox_private_key }}
        tag_prefix: ${{ inputs.tag_prefix }}
        odoo_version: ${{ inputs.odoo_version }}
        base_branch: ${{ inputs.base_branch }}
        dry_run: "false"

    - name: Post success and close issue (confirm)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 'confirm' && steps.do-release.outcome == 'success' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        COMMENT_ID: ${{ inputs.comment_id }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess

        repo         = os.environ['REPO']
        issue_number = os.environ['ISSUE_NUMBER']
        comment_id   = os.environ['COMMENT_ID']
        gh_token     = os.environ['GH_TOKEN']
        env          = {**os.environ, 'GH_TOKEN': gh_token}

        data    = json.load(open('/tmp/release_parsed.json'))
        new_tag = data['new_tag']

        url_r = subprocess.run(
            ['gh', 'release', 'view', new_tag, '--repo', repo, '--json', 'url', '--jq', '.url'],
            capture_output=True, text=True, env=env,
        )
        release_url = url_r.stdout.strip() or f'https://github.com/{repo}/releases/tag/{new_tag}'

        subprocess.run([
            'gh', 'issue', 'comment', issue_number, '--repo', repo,
            '--body', f'\u2705 Released as [{new_tag}]({release_url}).\nClosing this proposal.',
        ], env=env, check=True)
        subprocess.run([
            'gh', 'api', f'repos/{repo}/issues/comments/{comment_id}/reactions',
            '-X', 'POST', '-f', 'content=rocket',
        ], env=env, capture_output=True)
        subprocess.run([
            'gh', 'issue', 'close', issue_number,
            '--repo', repo, '--reason', 'completed',
        ], env=env, check=True)
        PYEOF

    - name: Post failure (confirm)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 'confirm' && steps.do-release.outcome == 'failure' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        COMMENT_ID: ${{ inputs.comment_id }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        python3 - <<'PYEOF'
        import os, subprocess

        repo         = os.environ['REPO']
        issue_number = os.environ['ISSUE_NUMBER']
        comment_id   = os.environ['COMMENT_ID']
        run_url      = os.environ['RUN_URL']
        gh_token     = os.environ['GH_TOKEN']
        env          = {**os.environ, 'GH_TOKEN': gh_token}

        subprocess.run([
            'gh', 'issue', 'comment', issue_number, '--repo', repo,
            '--body', (
                f'\u274c Release creation failed. '
                f'Check the [workflow run]({run_url}) for details.\n\n'
                'The proposal remains open — retry with `/release confirm` after fixing the issue.'
            ),
        ], env=env, check=True)
        subprocess.run([
            'gh', 'api', f'repos/{repo}/issues/comments/{comment_id}/reactions',
            '-X', 'POST', '-f', 'content=-1',
        ], env=env, capture_output=True)
        PYEOF

    # ========================
    # CANCEL path
    # ========================

    - name: Handle cancel
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 'cancel' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        COMMENT_ID: ${{ inputs.comment_id }}
        COMMENTER: ${{ inputs.commenter }}
      run: |
        python3 - <<'PYEOF'
        import os, subprocess

        repo         = os.environ['REPO']
        issue_number = os.environ['ISSUE_NUMBER']
        comment_id   = os.environ['COMMENT_ID']
        commenter    = os.environ['COMMENTER']
        gh_token     = os.environ['GH_TOKEN']
        env          = {**os.environ, 'GH_TOKEN': gh_token}

        subprocess.run([
            'gh', 'issue', 'comment', issue_number, '--repo', repo,
            '--body', f'\U0001f6ab Release proposal cancelled by @{commenter}. No tags were created.',
        ], env=env, check=True)
        subprocess.run([
            'gh', 'api', f'repos/{repo}/issues/comments/{comment_id}/reactions',
            '-X', 'POST', '-f', 'content=rocket',
        ], env=env, capture_output=True)
        subprocess.run([
            'gh', 'issue', 'close', issue_number,
            '--repo', repo, '--reason', 'not planned',
        ], env=env, check=True)
        PYEOF

    # ========================
    # RE-ANALYZE path
    # ========================

    - name: Post re-analyzing comment
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 're-analyze' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issue_number }}
      run: |
        gh issue comment "$ISSUE_NUMBER" \
          --repo "$REPO" \
          --body $'\U0001f504 Re-analyzing commits since last tag...'

    - name: Re-run analysis (re-analyze)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 're-analyze' }}
      uses: unifica-paraguay/unifox-ci/actions/release-proposal@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        unifox_app_id: ${{ inputs.unifox_app_id }}
        unifox_private_key: ${{ inputs.unifox_private_key }}
        tag_prefix: ${{ inputs.tag_prefix }}
        odoo_version: ${{ inputs.odoo_version }}
        base_branch: ${{ inputs.base_branch }}

    - name: React success (re-analyze)
      if: ${{ steps.parse.outputs.authorized == 'true' && steps.parse.outputs.command == 're-analyze' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        COMMENT_ID: ${{ inputs.comment_id }}
      run: |
        gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -X POST -f content=rocket
