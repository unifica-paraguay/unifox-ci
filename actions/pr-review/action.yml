name: "unifox-ci: PR AI Code Review"
description: >
  Stateful AI code review using Claude. Reads previous bot review threads
  (including resolution status) before calling Claude so it replies to
  existing threads instead of duplicating, and stays consistent across pushes.
  Supports all org profiles: odoo, react, astro, python, node, default.
  Uses severity levels (critical/warning/suggestion) so only real blockers
  trigger CHANGES_REQUESTED; suggestions are grouped in the summary comment
  and never generate inline noise.

inputs:
  anthropic_api_key:
    description: "Anthropic API key"
    required: true
  unifox_app_id:
    description: "unifox-ci GitHub App ID"
    required: true
  unifox_private_key:
    description: "unifox-ci GitHub App private key"
    required: true
  base_branch:
    description: "Base branch of the repository"
    required: false
    default: "main"
  profile:
    description: "Repository profile (odoo, react, astro, python, node, default, auto)"
    required: false
    default: "auto"
  static_checks_failed:
    description: "Whether the static-checks job failed (true/false). Prevents approval when pipeline checks are broken."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Generate app token
      id: gen-token
      continue-on-error: true
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.unifox_app_id }}
        private-key: ${{ inputs.unifox_private_key }}

    - name: Require app token
      id: token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.gen-token.outputs.token }}
      run: |
        if [ -n "$APP_TOKEN" ]; then
          echo "value=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Token: using GitHub App (unifox-ci[bot])"
          exit 0
        fi
        echo "ERROR: unifox-ci GitHub App is not installed — install it at https://github.com/apps/unifox-ci"
        exit 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install requests

    - name: Detect profile
      id: profile
      shell: bash
      env:
        PROFILE_INPUT: ${{ inputs.profile }}
      run: |
        chmod +x "${{ github.action_path }}/../../scripts/detect_framework.sh"
        if [ "$PROFILE_INPUT" = "auto" ] || [ -z "$PROFILE_INPUT" ]; then
          PROFILE=$("${{ github.action_path }}/../../scripts/detect_framework.sh" .)
          echo "Auto-detected profile: $PROFILE"
        else
          PROFILE="$PROFILE_INPUT"
          echo "Using explicit profile: $PROFILE"
        fi
        echo "value=${PROFILE}" >> "$GITHUB_OUTPUT"

    - name: Collect diff
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
        PROFILE: ${{ steps.profile.outputs.value }}
      run: |
        git fetch origin "$BASE_BRANCH"

        # Collect diffs in priority order, truncating to 48 KB total.
        # Sections are ordered by review priority; the budget ensures the most
        # important code is always included even for large PRs.
        # --diff-filter=AM: only Added/Modified files (no pure Deletions).
        python3 - <<'DIFFEOF'
        import os, subprocess
        from pathlib import Path

        base    = os.environ['BASE_BRANCH']
        profile = os.environ.get('PROFILE', 'default')

        def diff(patterns):
            args = ['git', 'diff', '--diff-filter=AM', f'origin/{base}...HEAD', '--'] + list(patterns)
            r = subprocess.run(args, capture_output=True, text=True)
            return r.stdout

        # Base sections present for every profile
        sections = []

        if profile == 'odoo':
            sections = [
                ('Python files',      diff(['*.py', ':!*/static/*', ':!*/__pycache__/*'])),
                ('Manifest files',    diff(['*/__manifest__.py'])),
                ('XML files',         diff(['*.xml'])),
                ('YAML/config files', diff(['*.yml', '*.yaml', '.flake8', '.unifox.yml',
                                            '*.cfg', '*.conf', '*.ini'])),
                ('Shell scripts',     diff(['*.sh'])),
                ('Docker files',      diff(['docker-compose*', 'Dockerfile*'])),
                ('Markdown files',    diff(['*.md'])),
            ]
        elif profile in ('react', 'astro', 'node'):
            sections = [
                ('TypeScript files',  diff(['*.ts', '*.tsx',
                                            ':!node_modules/*', ':!dist/*',
                                            ':!build/*', ':!.next/*'])),
                ('JavaScript files',  diff(['*.js', '*.jsx', '*.mjs', '*.cjs',
                                            ':!node_modules/*', ':!dist/*',
                                            ':!*.min.js'])),
                ('Astro components',  diff(['*.astro'])),
                ('Style files',       diff(['*.css', '*.scss', '*.sass'])),
                ('Config/JSON files', diff(['*.json', ':!package-lock.json',
                                            ':!pnpm-lock.yaml', ':!yarn.lock',
                                            ':!node_modules/*'])),
                ('YAML/config files', diff(['*.yml', '*.yaml', '.env.example',
                                            '.eslintrc*', '.prettierrc*',
                                            'tsconfig*.json'])),
                ('Shell scripts',     diff(['*.sh'])),
                ('Docker files',      diff(['docker-compose*', 'Dockerfile*'])),
                ('Markdown files',    diff(['*.md', '*.mdx'])),
            ]
        elif profile == 'python':
            sections = [
                ('Python files',      diff(['*.py', ':!*/__pycache__/*'])),
                ('Config files',      diff(['*.toml', '*.cfg', '*.ini', '*.txt',
                                            'requirements*.txt', '.env.example'])),
                ('YAML/config files', diff(['*.yml', '*.yaml'])),
                ('Docker files',      diff(['docker-compose*', 'Dockerfile*'])),
                ('Shell scripts',     diff(['*.sh'])),
                ('Markdown files',    diff(['*.md'])),
            ]
        else:
            # default: cover everything
            sections = [
                ('Python files',      diff(['*.py', ':!*/__pycache__/*'])),
                ('TypeScript files',  diff(['*.ts', '*.tsx', ':!node_modules/*',
                                            ':!dist/*', ':!build/*'])),
                ('JavaScript files',  diff(['*.js', '*.jsx', ':!node_modules/*',
                                            ':!dist/*', ':!*.min.js'])),
                ('XML files',         diff(['*.xml'])),
                ('YAML/config files', diff(['*.yml', '*.yaml', '*.cfg', '*.ini',
                                            '*.toml', '.env.example'])),
                ('Shell scripts',     diff(['*.sh'])),
                ('Docker files',      diff(['docker-compose*', 'Dockerfile*'])),
                ('Markdown files',    diff(['*.md', '*.mdx'])),
            ]

        limit = 48000
        used  = 0
        parts = []
        for label, content in sections:
            if not content.strip():
                continue
            header = f'=== {label} ===\n'
            chunk  = header + content + '\n'
            remaining = limit - used
            if remaining <= len(header) + 10:
                break
            if len(chunk) > remaining:
                chunk = chunk[:remaining] + '\n... (truncated)\n'
            parts.append(chunk)
            used += len(chunk)
            if used >= limit:
                break

        Path('/tmp/review_diff.txt').write_text('\n'.join(parts))
        print(f"Diff collected: {used} bytes across {len(parts)} section(s) (profile={profile})")
        DIFFEOF

        BASE_BRANCH="${BASE_BRANCH}" PROFILE="${PROFILE}" python3 - <<'PYEOF'
        import ast, os, re, subprocess
        from pathlib import Path

        base    = os.environ.get('BASE_BRANCH', 'main')
        profile = os.environ.get('PROFILE', 'default')

        # Python convention extraction (docstrings from unchanged methods)
        py_result = subprocess.run(
            ['git', 'diff', '--name-only', f'origin/{base}...HEAD', '--',
             '*.py', ':!*/static/*', ':!*/__pycache__/*'],
            capture_output=True, text=True,
        )
        py_changed = [f for f in py_result.stdout.strip().splitlines() if f and Path(f).exists()]

        lines = [
            '=== Existing conventions in changed files ===',
            '(Unchanged code \u2014 these ARE the established conventions for this codebase)',
            '',
        ]
        found = False

        # Python: extract docstring opening style from existing methods
        for fpath in py_changed:
            try:
                src  = Path(fpath).read_text()
                tree = ast.parse(src)
                src_lines = src.splitlines()
            except Exception:
                continue
            funcs = []
            for node in ast.walk(tree):
                if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                    body = node.body
                    if (body and isinstance(body[0], ast.Expr)
                            and isinstance(body[0].value, ast.Constant)):
                        doc_lineno = body[0].lineno - 1
                        opening = src_lines[doc_lineno].strip() if doc_lineno < len(src_lines) else ''
                        funcs.append(f'  def {node.name}():  {opening}')
            if funcs:
                found = True
                lines.append(f'File: {fpath}')
                lines.extend(funcs[:20])
                lines.append('')

        # JS/TS: capture JSDoc and function signatures from unchanged lines
        if profile in ('react', 'astro', 'node', 'default'):
            ts_result = subprocess.run(
                ['git', 'diff', '--name-only', f'origin/{base}...HEAD', '--',
                 '*.ts', '*.tsx', '*.js', '*.jsx', ':!node_modules/*', ':!dist/*'],
                capture_output=True, text=True,
            )
            ts_changed = [f for f in ts_result.stdout.strip().splitlines() if f and Path(f).exists()]

            jsdoc_re = re.compile(r'/\*\*.*?\*/', re.DOTALL)
            fn_re    = re.compile(
                r'(?:export\s+)?(?:async\s+)?(?:function\s+(\w+)|const\s+(\w+)\s*=\s*(?:async\s+)?\()',
            )
            for fpath in ts_changed[:8]:
                try:
                    src = Path(fpath).read_text(errors='replace')
                except Exception:
                    continue
                jsdocs = jsdoc_re.findall(src)
                fns    = fn_re.findall(src)
                if jsdocs or fns:
                    found = True
                    lines.append(f'File: {fpath}')
                    for doc in jsdocs[:5]:
                        first_line = doc.strip().split('\n')[0][:120]
                        lines.append(f'  JSDoc: {first_line}')
                    for name_a, name_b in fns[:10]:
                        name = name_a or name_b
                        lines.append(f'  fn: {name}()')
                    lines.append('')

        if not found:
            lines.append('(no conventions extracted from changed files)')

        Path('/tmp/review_conventions.txt').write_text('\n'.join(lines))
        print(f"Convention extraction: {len(py_changed)} Python + JS/TS files scanned")
        PYEOF

        # Collect full current content of changed files so Claude has complete
        # context — not just the diff hunk. Without this, Claude misses declarations
        # that sit outside the changed lines (e.g. shell: bash above a run: block,
        # variable assignments above the line where they are used).
        #
        # Strategy:
        #   - YAML/shell/Dockerfile: always include in full (small, dense with context)
        #   - Python/XML/other: include only if the file is small (< 4 KB)
        #   - Total budget: 20 KB — keeps the prompt manageable
        #   - Deleted files (not present on disk) are skipped automatically
        BASE_BRANCH="${BASE_BRANCH}" PROFILE="${PROFILE}" python3 - <<'FULLEOF'
        import os, subprocess
        from pathlib import Path

        base    = os.environ.get('BASE_BRANCH', 'main')
        profile = os.environ.get('PROFILE', 'default')

        BUDGET   = 20000   # 20 KB total for full file contents
        SMALL    = 4000    # include small code files in full
        # Always include in full (dense with context, usually small)
        ALWAYS   = {'.yml', '.yaml', '.sh', '.bash', '.toml', '.cfg',
                    '.ini', '.env', '.env.example', '.eslintrc', '.prettierrc'}
        YAML_MAX = 8000    # per-file cap for always-include files

        # Files to skip entirely — generated, locked, or binary
        SKIP_PATTERNS = {
            'node_modules', 'dist', 'build', '.next', '.astro',
            '__pycache__', '.venv', 'venv',
        }
        SKIP_EXTS = {'.lock', '.pyc', '.min.js', '.map'}

        result = subprocess.run(
            ['git', 'diff', '--diff-filter=AM', '--name-only', f'origin/{base}...HEAD'],
            capture_output=True, text=True,
        )
        changed = [f for f in result.stdout.strip().splitlines() if f and Path(f).exists()]

        parts = []
        used  = 0

        for fpath in changed:
            p   = Path(fpath)
            ext = p.suffix.lower()

            # Skip generated/locked/binary files
            parts_of_path = set(p.parts)
            if parts_of_path & SKIP_PATTERNS:
                continue
            if ext in SKIP_EXTS:
                continue
            # Skip package-lock / pnpm-lock / yarn.lock by name
            if p.name in ('package-lock.json', 'pnpm-lock.yaml', 'yarn.lock'):
                continue

            try:
                content = p.read_text(errors='replace')
            except Exception:
                continue

            is_always = (ext in ALWAYS or p.name.startswith('.eslint')
                         or p.name.startswith('.prettier') or p.name.startswith('tsconfig'))

            if is_always:
                if len(content) > YAML_MAX:
                    content = content[:YAML_MAX] + '\n... (truncated — exceeds per-file cap)\n'
            else:
                if len(content) > SMALL:
                    continue  # covered by the diff

            remaining = BUDGET - used
            if remaining <= 50:
                break

            header = f'=== Full file: {fpath} ===\n'
            body   = header + content
            if len(body) > remaining:
                body = body[:remaining] + '\n... (truncated)\n'
            parts.append(body)
            used += len(body)

        Path('/tmp/review_full_files.txt').write_text('\n\n'.join(parts))
        print(f"Full file contents: {used} bytes across {len(parts)} file(s)")
        FULLEOF

    - name: Collect existing review context
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess

        repo  = os.environ['REPO']
        pr    = os.environ['PR_NUMBER']
        owner, repo_name = repo.split('/', 1)

        def gh_list(endpoint):
            r = subprocess.run(['gh', 'api', '--paginate', endpoint],
                               capture_output=True, text=True)
            try:
                return json.loads(r.stdout) if r.returncode == 0 and r.stdout.strip() else []
            except Exception:
                return []

        all_reviews  = gh_list(f'repos/{repo}/pulls/{pr}/reviews')
        all_comments = gh_list(f'repos/{repo}/pulls/{pr}/comments')

        bot_reviews  = [r for r in all_reviews  if r.get('user', {}).get('type') == 'Bot']
        bot_comments = [c for c in all_comments if c.get('user', {}).get('type') == 'Bot']

        gql = (
            'query($owner:String!,$repo:String!,$pr:Int!){'
            'repository(owner:$owner,name:$repo){'
            'pullRequest(number:$pr){'
            'reviewThreads(first:100){'
            'nodes{id isResolved '
            'comments(first:10){nodes{databaseId path originalLine}}'
            '}}}}}'
        )
        gql_r = subprocess.run([
            'gh', 'api', 'graphql',
            '-f', f'query={gql}',
            '-f', f'owner={owner}',
            '-f', f'repo={repo_name}',
            '-F', f'pr={int(pr)}',
        ], capture_output=True, text=True)

        c2t = {}
        if gql_r.returncode == 0:
            nodes = (
                (json.loads(gql_r.stdout).get('data') or {})
                .get('repository', {})
                .get('pullRequest', {})
                .get('reviewThreads', {})
                .get('nodes', [])
            )
            for t in nodes:
                for c in t.get('comments', {}).get('nodes', []):
                    c2t[c['databaseId']] = {
                        'thread_id':   t['id'],
                        'is_resolved': t['isResolved'],
                    }

        prev_comments = [{
            'id':          c['id'],
            'path':        c.get('path', ''),
            'line':        c.get('original_line') or c.get('line'),
            'body':        c.get('body', '')[:400],
            'is_resolved': c2t.get(c['id'], {}).get('is_resolved', False),
        } for c in bot_comments]

        # Only APPROVED/CHANGES_REQUESTED reviews can be dismissed via the API.
        # COMMENTED reviews silently fail the dismiss call — filter them out.
        dismissable_ids = [
            r['id'] for r in bot_reviews
            if r.get('state') in ('APPROVED', 'CHANGES_REQUESTED')
        ]

        json.dump({
            'prev_comments':     prev_comments,
            'bot_review_ids':    dismissable_ids,
            'comment_to_thread': {str(k): v for k, v in c2t.items()},
        }, open('/tmp/review_context.json', 'w'), indent=2)

        print(f"Bot reviews: {len(bot_reviews)}, comments: {len(bot_comments)}, threads: {len(c2t)}")
        PYEOF

    - name: Build and run review prompt
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BRANCH: ${{ github.head_ref }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        PROFILE: ${{ steps.profile.outputs.value }}
        SCRIPTS_DIR: ${{ github.action_path }}/../../scripts
      run: |
        python3 - <<'PYEOF'
        import json, os

        ctx     = json.load(open('/tmp/review_context.json'))
        diff    = open('/tmp/review_diff.txt').read()
        prev    = ctx['prev_comments']
        profile = os.environ.get('PROFILE', 'default')

        try:
            conventions = open('/tmp/review_conventions.txt').read()
        except FileNotFoundError:
            conventions = ''
        try:
            full_files = open('/tmp/review_full_files.txt').read().strip()
        except FileNotFoundError:
            full_files = ''

        pending  = [c for c in prev if not c['is_resolved']]
        resolved = [c for c in prev if c['is_resolved']]

        # ------------------------------------------------------------------ #
        # Profile-specific reviewer persona and checklist
        # ------------------------------------------------------------------ #
        PERSONAS = {
            'odoo':    'senior Odoo developer',
            'react':   'senior React / TypeScript engineer',
            'astro':   'senior Astro / frontend engineer',
            'python':  'senior Python engineer',
            'node':    'senior Node.js / TypeScript engineer',
            'default': 'senior software engineer',
        }
        persona = PERSONAS.get(profile, PERSONAS['default'])

        CHECKLISTS = {
            'odoo': [
                "1. **Correctness** (critical): logic bugs, wrong Odoo API usage, missing super() in CRUD overrides",
                "2. **Security** (critical): SQL injection via _query(), unsafe eval(), unescaped user input in XML/QWeb",
                "3. **Data handling** (critical): manual string-based encoding instead of stdlib (use werkzeug.urls.url_encode, json.dumps, etc.); raw SQL string interpolation outside _query()",
                "4. **Odoo model conventions** (critical):",
                "   - _name/_description must appear before fields in the class body",
                "   - Many2one fields must end in _id; One2many/Many2many in _ids",
                "   - compute → _compute_<field>, onchange → _onchange_<field>, constraint → _check_<name>",
                "   - Button action methods must call self.ensure_one()",
                "   - Import order: stdlib → odoo → third-party addons",
                "   - No cr.commit() without an explanatory comment",
                "   - No bare except without a savepoint",
                "   - No _() around strings that use % or .format() inside the call",
                "4. **XML** (critical): IDs must follow <module>.<model>_view_<type>; no hardcoded IDs",
                "6. **Tests**: (critical) broken/vacuous assertions — tests that always pass or always fail regardless of the implementation, incorrect return-value unpacking, assertions that compare incompatible types; (warning) new public methods or code paths without any test coverage",
                "7. **Manifest** (warning): version bumped, correct depends, all new files listed in data/assets",
                "8. **Performance** (warning): N+1 queries, missing sudo(), unnecessary iterations",
                "9. **Field naming** (warning): custom fields must use the module prefix",
            ],
            'react': [
                "1. **Correctness** (critical): logic bugs, incorrect hook calls, stale closures",
                "2. **Security** (critical): dangerouslySetInnerHTML with unsanitized input, no input validation at API boundaries",
                "3. **React rules** (critical):",
                "   - Hooks must only be called at the top level (no hooks inside loops, conditions, or nested functions)",
                "   - useEffect / useCallback / useMemo dependency arrays must be complete",
                "   - Async effects must return a cleanup function (AbortController) to prevent updates on unmounted components",
                "   - Key prop on list items must be stable and unique — never array index when list is reordered",
                "4. **TypeScript** (critical): no implicit any without justification; all component props must be typed",
                "5. **Performance** (warning): inline object/array/function literals in JSX break memoization",
                "6. **Accessibility** (warning): interactive elements must have accessible names",
                "7. **Tests**: (critical) broken/vacuous assertions — tests that always pass or always fail regardless of implementation; (warning) new components and hooks without test coverage",
                "8. **No console.log / debugger** (warning) left in production code",
            ],
            'astro': [
                "1. **Correctness** (critical): logic bugs, incorrect use of server vs client context",
                "2. **Security** (critical): set:html with unsanitized input; server secrets exposed to client",
                "3. **Astro conventions** (critical):",
                "   - Server-only code must stay in frontmatter (---)",
                "   - Dynamic routes must export getStaticPaths() in SSG mode",
                "   - Content collection schemas must match frontmatter fields",
                "4. **TypeScript** (critical): all props and data shapes must be typed",
                "5. **Performance** (warning): use client:idle or client:visible instead of client:load where possible",
                "6. **Images** (warning): use Astro's <Image> component for local images",
                "7. **Accessibility** (warning): interactive elements need accessible names",
                "8. **No console.log / debugger** (warning) left in production code",
            ],
            'python': [
                "1. **Correctness** (critical): logic bugs, incorrect exception handling, resource leaks",
                "2. **Security** (critical): SQL string interpolation, eval/exec on untrusted input, hardcoded secrets",
                "3. **Data handling** (critical): manual string-based encoding/escaping instead of stdlib (urllib.parse.quote, json.dumps, html.escape); silent data corruption for edge-case inputs",
                "4. **Python conventions** (critical):",
                "   - No bare except; catch specific exceptions",
                "   - Use context managers (with) for files, connections, and locks",
                "   - No mutable default arguments",
                "5. **Type hints** (warning): public functions must have parameter and return type annotations",
                "6. **Tests**: (critical) broken/vacuous assertions — tests that always pass or always fail regardless of implementation, incorrect return-value unpacking; (warning) new public functions or business logic without test coverage",
                "7. **Logging** (warning): no print() in production code; use logging module",
                "8. **Dependencies** (warning): new packages must be added to requirements files or pyproject.toml",
            ],
            'node': [
                "1. **Correctness** (critical): unhandled promise rejections, fire-and-forget async, logic bugs",
                "2. **Security** (critical): eval/new Function on untrusted input, SQL string interpolation, hardcoded secrets, no input validation",
                "3. **Data handling** (critical): manual string-based encoding instead of encodeURIComponent/URL/URLSearchParams; JSON.parse without try/catch on untrusted input",
                "4. **TypeScript** (critical): no implicit any; strict mode required",
                "5. **Error handling** (critical): every async function must have try/catch or .catch(); no silent failure",
                "6. **Tests**: (critical) broken/vacuous assertions — tests that always pass or always fail regardless of implementation; (warning) new logic paths without test coverage",
                "7. **No console.log / debugger** (warning) left in production code",
                "8. **Dependencies** (warning): new packages must be in package.json; no star/latest versions",
                "9. **Env vars** (warning): all env vars must be documented in .env.example",
            ],
        }
        base_checks = [
            "A. **YAML workflows** (critical): hardcoded secrets in workflow files; secrets or env vars exposed to untrusted contexts; (warning): permissions not minimised per job; secret names not matching org standard",
            "B. **Docker / docker-compose** (critical): hardcoded credentials in images or compose files; (warning): unnecessary volume mounts; deprecated syntax",
            "C. **Shell scripts** (critical): missing 'set -euo pipefail' — silent failures in CI scripts are dangerous; unquoted variables that expand unexpectedly; CI steps that call 'exit 1' without first printing a human-readable explanation of what failed and why — a bare 'Process completed with exit code 1' forces engineers to open logs and is not acceptable in production CI; (warning): non-idiomatic patterns",
            "D. **Config files** (warning): required fields missing; values inconsistent with repo structure",
        ]
        checklist = CHECKLISTS.get(profile, [
            "1. **Correctness** (critical): logic bugs, incorrect error handling, resource leaks",
            "2. **Security** (critical): injection, hardcoded secrets, untrusted input not validated",
            "3. **Data handling** (critical): manual string-based encoding/escaping instead of stdlib functions (use urllib.parse.quote, json.dumps, etc.); silent data corruption for edge-case inputs",
            "4. **Conventions** (warning): follow established patterns visible in the codebase",
            "5. **Tests**: (critical) broken/vacuous assertions — tests that always pass or always fail regardless of implementation; (warning) new logic without test coverage",
        ]) + base_checks

        # ------------------------------------------------------------------ #
        # Follow-up / stateful context block
        # ------------------------------------------------------------------ #
        if prev:
            context_block = '\n'.join([
                f"This is a follow-up review. You previously left {len(prev)} comment(s):",
                "",
                json.dumps(prev, indent=2),
                "",
                f"Pending (unresolved): {len(pending)}",
                f"Already resolved: {len(resolved)}",
                "",
                "FOLLOW-UP RULES \u2014 strictly enforced:",
                "- MANDATORY: generate a reply_to entry for EVERY pending comment — no exceptions.",
                "  For each comment_id: check the current diff and mark resolved=true (fixed) or resolved=false (still present).",
                "- Pending issue FIXED in the current diff \u2192 reply_to with resolved=true",
                "- Pending issue STILL PRESENT, unchanged \u2192 reply_to with resolved=false; do NOT create a duplicate new_comment at that location",
                "- Only genuinely NEW issues (not in the pending list) go in new_comments",
                "- NEVER duplicate a new_comment at a (path, line) that already has a pending comment",
                "- NEVER approve while any critical pending issue remains unresolved",
                "- RESOLVED THREADS ARE CLOSED DECISIONS: a resolved thread means the developer",
                "  reviewed your feedback and deliberately chose the current code. Do NOT re-flag",
                "  the same pattern, file, or concern from a resolved thread on any future push.",
                "  This is the primary cause of infinite review loops — avoid it.",
                "  Exception: if a resolved thread hides a critical security or correctness bug,",
                "  you may flag it ONCE in new_comments with explicit reasoning. Never repeat it.",
                "- LOOP PREVENTION: do not request cosmetic changes (formatting, style preferences)",
                "  more than once. If the developer kept the original style, accept it.",
            ])
        else:
            context_block = "This is the first review of this PR."

        # ------------------------------------------------------------------ #
        # Assemble prompt
        # ------------------------------------------------------------------ #
        guidelines_note = {
            'odoo':    'The Odoo coding guidelines and git guidelines are loaded in your system prompt — apply them strictly.',
            'react':   'The JavaScript/TypeScript/React guidelines are loaded in your system prompt — apply them strictly.',
            'astro':   'The JavaScript/TypeScript/Astro guidelines are loaded in your system prompt — apply them strictly.',
            'python':  'The Python best practices and git guidelines are loaded in your system prompt.',
            'node':    'The JavaScript/TypeScript/Node.js guidelines are loaded in your system prompt — apply them strictly.',
            'default': 'The git guidelines are loaded in your system prompt.',
        }.get(profile, '')

        prompt_parts = [
            f"You are a {persona} performing a code review.",
            guidelines_note,
            "",
            f"PR title: {os.environ['PR_TITLE']}",
            f"Branch:   {os.environ['PR_BRANCH']}",
            f"Author:   {os.environ['PR_AUTHOR']}",
            f"Profile:  {profile}",
            "",
            context_block,
            "",
        ]

        if conventions:
            prompt_parts += [
                conventions,
                "",
                "CONVENTION CHECK \u2014 strictly enforced:",
                "Before flagging ANY style or formatting issue, look for the same pattern in",
                "the 'Existing conventions' section above. If unchanged code uses the same",
                "pattern, it IS the established convention for this codebase — accept it.",
                "Do NOT flag style preferences that are already consistently applied.",
                "",
            ]

        if full_files:
            prompt_parts += [
                "=== FULL CURRENT FILE CONTENTS ===",
                "These are the COMPLETE current file contents (not just the diff).",
                "Read these FIRST. Any declaration visible here is present in the code —",
                "do NOT flag it as missing just because it is outside the diff hunk.",
                "",
                full_files,
                "",
            ]

        prompt_parts += [
            "Current diff (what changed in this PR):",
            "```diff",
            diff,
            "```",
            "",
            "## Review checklist",
            "",
            "\n".join(checklist),
            "",
            "## Severity levels",
            "- **critical** \u2192 must be fixed before merge; triggers CHANGES_REQUESTED.",
            "  Classify as critical if ANY of these apply:",
            "  \u2022 Security: injection, hardcoded secrets, exposed credentials, untrusted input passed unsanitised",
            "  \u2022 Correctness: logic bugs, wrong API usage, broken API contracts, resource leaks, unhandled exceptions at runtime",
            "  \u2022 Data handling: manual string-based encoding/escaping that silently corrupts certain inputs (e.g. str.replace instead of urllib.parse.quote); incorrect serialisation/deserialisation",
            "  \u2022 Tests: broken or vacuous assertions that always pass or always fail regardless of the implementation; incorrect return-value unpacking (e.g. comparing a tuple to a list); tests that do not actually exercise the intended behaviour",
            "  \u2022 CI/CD: missing 'set -euo pipefail' in shell scripts; hardcoded secrets in workflow files; CI steps that exit with a bare 'exit 1' or 'Process completed with exit code N' without printing which specific check failed or why — engineers must not need to open logs to understand what broke",
            "  \u2022 Any violation of the critical items in the review checklist above",
            "- **warning** \u2192 important but not blocking; included in the PR summary.",
            "  Use for: missing test coverage on new logic, performance concerns, incomplete docs,",
            "  style/convention violations, code duplication that creates maintenance risk.",
            "  WARNING: do NOT downgrade a critical issue to warning to avoid blocking the PR.",
            "- **suggestion** \u2192 take-it-or-leave-it improvement; listed briefly in summary only.",
            "  Use for: readability, naming preferences, minor optimisations.",
            "  IMPORTANT: do NOT create inline comments for suggestions — put them in the summary text only.",
            "",
            "## Output format",
            "",
            "Output ONLY a valid JSON object (no markdown fences, no explanation outside JSON):",
            '{',
            '  "verdict": "APPROVED" | "CHANGES_REQUESTED" | "COMMENT",',
            '  "summary": "2-4 sentence summary. If follow-up: mention resolved vs still-pending. Mention warnings and suggestions briefly in prose — do NOT list them as separate comments.",',
            '  "new_comments": [',
            '    {"path": "file.py", "line": 42, "severity": "critical" | "warning", "body": "Concise issue + why it matters + suggested fix"}',
            '  ],',
            '  "reply_to": [{"comment_id": 123456, "body": "Reply text", "resolved": true}]',
            '}',
            "",
            "## Output rules",
            "- verdict=APPROVED: zero pending critical issues AND no new critical issues",
            "- verdict=CHANGES_REQUESTED: one or more critical issues pending or new",
            "- verdict=COMMENT: only warnings / suggestions, nothing critical",
            "- new_comments: max 5 items, critical and warning severity ONLY",
            "  Suggestions must go in the summary text, never as inline comments",
            "- reply_to: one entry per previous pending comment (mandatory)",
            "- All text in English",
            "- PR title scope may contain dots, underscores, slashes (e.g. '.github', 'unifica_payment') — do NOT flag these as invalid",
            "- Do not flag TODO comments unless they have been there for multiple PRs",
            "- Do not flag formatting/style that matches the existing codebase convention",
        ]

        # Auto-approve only when the diff is genuinely empty and no pending critical issues.
        if not diff.strip() and not pending:
            import json as _json
            _json.dump({
                'verdict': 'APPROVED',
                'summary': 'No changes detected in this PR. Automatically approved.',
                'new_comments': [],
                'reply_to': [],
            }, open('/tmp/review_parsed.json', 'w'))
            print("Diff is empty and no pending issues — auto-approved, skipping Claude call")
        else:
            prompt_text = '\n'.join(prompt_parts)
            open('/tmp/review_prompt.txt', 'w').write(prompt_text)
            print(f"Prompt written ({len(prompt_text)} chars), profile={profile}, follow-up={bool(prev)}")

        PYEOF

        if [ ! -f /tmp/review_parsed.json ]; then
          UNIFOX_PROFILE="${PROFILE}" python "${SCRIPTS_DIR}/claude_api.py" \
            < /tmp/review_prompt.txt > /tmp/review_raw.json
        fi

        python3 - <<'PYEOF'
        import json, os

        # Skip parsing if auto-approved path already wrote the parsed file
        if os.path.exists('/tmp/review_parsed.json'):
            data = json.load(open('/tmp/review_parsed.json'))
            print(f"Using pre-built result: {data['verdict']}")
        else:
            raw = open('/tmp/review_raw.json').read().strip()
            if raw.startswith('```'):
                raw = raw.split('\n', 1)[1].rsplit('```', 1)[0].strip()
            try:
                data = json.loads(raw)
            except json.JSONDecodeError as e:
                print(f"Warning: could not parse response ({e}) — safe fallback")
                # _is_parse_error=True tells downstream code to skip auto-resolve so
                # pending threads are NOT silently closed when Claude returned garbage.
                data = {'verdict': 'COMMENT', 'summary': 'Review parse error.', 'new_comments': [], 'reply_to': [], '_is_parse_error': True}

        if 'veredicto' in data and 'verdict' not in data:
            data['verdict'] = data.pop('veredicto')
        if data.get('verdict') not in ('APPROVED', 'CHANGES_REQUESTED', 'COMMENT'):
            data['verdict'] = 'COMMENT'
        data.setdefault('new_comments', [])
        data.setdefault('reply_to', [])

        # Enforce: suggestions must NOT appear as inline comments.
        # If Claude accidentally put severity=suggestion as inline, demote it.
        inline_comments = []
        for c in data['new_comments']:
            sev = c.get('severity', 'warning')
            if sev == 'suggestion':
                # Move to summary (we'll note it in the summary step)
                continue
            inline_comments.append(c)
        # Cap at 5 inline comments — highest severity first
        SEV_ORDER = {'critical': 0, 'warning': 1}
        inline_comments.sort(key=lambda c: SEV_ORDER.get(c.get('severity', 'warning'), 1))
        data['new_comments'] = inline_comments[:5]

        # Re-evaluate verdict: CHANGES_REQUESTED only if there are critical issues
        has_critical = any(c.get('severity') == 'critical' for c in data['new_comments'])
        pending_critical = any(
            c.get('severity') == 'critical'
            for c in (data.get('reply_to') or [])
            if not c.get('resolved', True)
        )
        if data['verdict'] == 'CHANGES_REQUESTED' and not has_critical and not pending_critical:
            data['verdict'] = 'COMMENT'

        json.dump(data, open('/tmp/review_parsed.json', 'w'), indent=2)
        print(f"Verdict: {data['verdict']}, inline: {len(data['new_comments'])}, reply_to: {len(data['reply_to'])}")
        PYEOF

    - name: Execute review actions
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        SHA: ${{ github.event.pull_request.head.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        STATIC_CHECKS_FAILED: ${{ inputs.static_checks_failed }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess, sys

        ctx  = json.load(open('/tmp/review_context.json'))
        data = json.load(open('/tmp/review_parsed.json'))
        repo = os.environ['REPO']
        pr   = os.environ['PR_NUMBER']
        sha  = os.environ['SHA']
        c2t  = {int(k): v for k, v in ctx['comment_to_thread'].items()}

        def gh(endpoint, body=None, method=None):
            cmd = ['gh', 'api']
            if method:
                cmd += ['--method', method]
            if body is not None:
                cmd += ['--input', '-']
            cmd.append(endpoint)
            kw = {'capture_output': True, 'text': True}
            if body is not None:
                kw['input'] = json.dumps(body)
            return subprocess.run(cmd, **kw)

        errors = []

        for reply in data.get('reply_to', []):
            cid  = reply.get('comment_id')
            body = reply.get('body', '').strip()
            if not cid or not body:
                continue
            r = gh(f'repos/{repo}/pulls/comments/{cid}/replies',
                   body={'body': body}, method='POST')
            if r.returncode != 0:
                errors.append(f'reply {cid}: {r.stderr[:120]}')
                continue
            print(f'Replied to comment {cid}')

            if reply.get('resolved') and cid in c2t:
                tid = c2t[cid]['thread_id']
                gql = ('mutation($id:ID!){resolveReviewThread(input:{threadId:$id})'
                       '{thread{id isResolved}}}')
                r2 = subprocess.run(
                    ['gh', 'api', 'graphql', '-f', f'query={gql}', '-f', f'id={tid}'],
                    capture_output=True, text=True)
                if r2.returncode != 0:
                    errors.append(f'resolve thread {tid}: {r2.stderr[:120]}')
                else:
                    print(f'Resolved thread for comment {cid}')

        for rid in ctx.get('bot_review_ids', []):
            r = gh(f'repos/{repo}/pulls/{pr}/reviews/{rid}/dismissals',
                   body={'message': 'Superseded by updated review'}, method='PUT')
            if r.returncode != 0:
                print(f'Warning: could not dismiss review {rid}')

        prev        = ctx.get('prev_comments', [])
        pending_ids = {c['id'] for c in prev if not c['is_resolved']}
        was_pending = len(pending_ids)

        # Auto-resolve: pending threads not explicitly carried forward as still-pending.
        # Claude is instructed to generate reply_to for every pending comment, but as a
        # safety net we resolve any it silently omitted (avoids comment accumulation).
        # EXCEPTION: on parse error skip auto-resolve entirely — empty reply_to is not
        # Claude's intent; it means the response was unreadable, so leave threads alone.
        auto_resolved = 0
        if data.get('_is_parse_error'):
            print('Parse error detected — skipping auto-resolve to preserve pending threads')
        else:
            explicitly_still_pending = {
                r['comment_id'] for r in data.get('reply_to', [])
                if not r.get('resolved', True)
            }
            already_replied_resolved = {
                r['comment_id'] for r in data.get('reply_to', [])
                if r.get('resolved') and 'comment_id' in r
            }
            for comment in prev:
                cid = comment['id']
                if comment['is_resolved'] or cid in explicitly_still_pending:
                    continue
                if cid in already_replied_resolved:
                    continue  # already handled in the reply_to loop above
                tid = c2t.get(cid, {}).get('thread_id')
                if not tid:
                    print(f'Warning: no thread_id mapping for comment {cid} — cannot auto-resolve')
                    continue
                # Resolve the thread first; only post the reply if resolution succeeds.
                # This avoids a dangling reply comment when the GraphQL call fails.
                gql = ('mutation($id:ID!){resolveReviewThread(input:{threadId:$id})'
                       '{thread{id isResolved}}}')
                gql_r = subprocess.run(
                    ['gh', 'api', 'graphql', '-f', f'query={gql}', '-f', f'id={tid}'],
                    capture_output=True, text=True,
                )
                if gql_r.returncode == 0:
                    auto_resolved += 1
                    print(f'Auto-resolved thread for comment {cid}')
                    gh(
                        f'repos/{repo}/pulls/comments/{cid}/replies',
                        body={'body': '\u2705 Addressed \u2014 closing thread.'},
                        method='POST',
                    )
                else:
                    print(f'Warning: could not resolve thread {tid}: {gql_r.stderr.strip()}')
            if auto_resolved:
                print(f'Auto-resolved {auto_resolved} thread(s) not carried forward by Claude')

        # Only count as "newly done" comments that were actually pending before this review.
        # Avoids double-counting threads that were resolved externally (e.g. via GraphQL)
        # before the review ran — those are already in the already-resolved count.
        newly_done  = sum(1 for re in data.get('reply_to', [])
                          if re.get('resolved') and re.get('comment_id') in pending_ids)
        newly_done += auto_resolved
        now_pending = max(0, was_pending - newly_done)
        now_resolved = sum(1 for c in prev if c['is_resolved']) + newly_done
        new_count   = len([c for c in data.get('new_comments', [])
                           if c.get('path') and isinstance(c.get('line'), int)])

        parts = []
        if now_resolved:
            parts.append(f'{now_resolved} resolved')
        if now_pending:
            parts.append(f'{now_pending} pending')
        if new_count:
            parts.append(f'{new_count} new')
        status_str = ' \u00b7 '.join(parts) if parts else 'no issues'

        verdict = data.get('verdict', 'COMMENT')

        # Override: cannot approve when static checks (commit messages, lint,
        # PR size, etc.) are failing. The code may be fine but the PR is not
        # ready to merge until the pipeline is green.
        static_checks_failed = os.environ.get('STATIC_CHECKS_FAILED', 'false').lower() == 'true'
        override_note = ''
        if static_checks_failed and verdict == 'APPROVED':
            verdict = 'CHANGES_REQUESTED'
            override_note = (
                '\n\n---\n'
                '> **Pipeline checks are failing.** The code looks good, but the PR cannot '
                'be approved while static checks (commit messages, lint, PR size, …) are red. '
                'Fix those first, then re-push.'
            )
            print('Static checks failed — overriding APPROVED → CHANGES_REQUESTED')

        verdict_icon = {
            'APPROVED':          '\u2705',
            'CHANGES_REQUESTED': '\u274c',
            'COMMENT':           '\U0001f4ac',
        }.get(verdict, '\U0001f4ac')

        rev_body_parts = [
            '<!-- unifox-review -->',
            '',
            f'{verdict_icon} **{verdict.replace("_", " ").title()}**',
            '',
            data.get('summary', ''),
            '',
            f'**Issues:** {status_str}',
        ]

        rev_body = '\n'.join(rev_body_parts) + override_note

        event_map = {
            'APPROVED':          'APPROVE',
            'CHANGES_REQUESTED': 'REQUEST_CHANGES',
            'COMMENT':           'COMMENT',
        }
        event = event_map.get(verdict, 'COMMENT')

        SEV_PREFIX = {
            'critical':   '\U0001f534 **Critical**',
            'warning':    '\U0001f7e1 **Warning**',
            'suggestion': '\U0001f4a1 **Suggestion**',
        }
        inline = []
        for c in data.get('new_comments', []):
            if not (c.get('path') and isinstance(c.get('line'), int) and c.get('body')):
                continue
            sev    = c.get('severity', 'warning')
            prefix = SEV_PREFIX.get(sev, SEV_PREFIX['warning'])
            body   = f"{prefix}: {c['body']}"
            inline.append({'path': c['path'], 'line': c['line'], 'body': body, 'side': 'RIGHT'})

        payload = {'commit_id': sha, 'body': rev_body, 'event': event, 'comments': inline}
        r = gh(f'repos/{repo}/pulls/{pr}/reviews', body=payload, method='POST')
        if r.returncode != 0:
            # Inline comments were rejected (line numbers not in diff).
            # Rebuild the body without the inline count so the summary is accurate.
            fb_parts = []
            if now_resolved:
                fb_parts.append(f'{now_resolved} resolved')
            if now_pending:
                fb_parts.append(f'{now_pending} pending')
            fb_status = ' \u00b7 '.join(fb_parts) if fb_parts else 'No issues found'
            note = ''
            if inline:
                note = (f'\n\n_Note: {len(inline)} suggestion(s) could not be attached as inline '
                        f'comments (line numbers not present in diff). See summary above._')
            fallback_body = '\n'.join([
                '<!-- unifox-review -->',
                '',
                data.get('summary', '') + note,
                '',
                f'**Issues:** {fb_status}',
            ])
            payload['comments'] = []
            payload['body'] = fallback_body
            r2 = gh(f'repos/{repo}/pulls/{pr}/reviews', body=payload, method='POST')
            if r2.returncode != 0:
                print(f'Error creating review: {r2.stderr}')
                sys.exit(1)
            print(f'Review submitted (no inline comments \u2014 line mismatch): {event}')
        else:
            print(f'Review submitted: {event}, {len(inline)} inline comments')

        if errors:
            print(f'Non-fatal errors ({len(errors)}): {errors}')
        PYEOF

    - name: Tag author if changes requested
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess, sys

        try:
            data = json.load(open('/tmp/review_parsed.json'))
            ctx  = json.load(open('/tmp/review_context.json'))
        except Exception:
            sys.exit(0)

        if data.get('verdict') != 'CHANGES_REQUESTED':
            sys.exit(0)

        prev       = ctx.get('prev_comments', [])
        newly_done = sum(1 for r in data.get('reply_to', []) if r.get('resolved'))
        pending    = max(0, sum(1 for c in prev if not c['is_resolved']) - newly_done)
        new_cnt    = len(data.get('new_comments', []))
        total      = pending + new_cnt

        msg = (f"@{os.environ['PR_AUTHOR']} unifox-ci has requested changes "
               f"({total} issue(s) pending). Please review the inline comments.")
        subprocess.run([
            'gh', 'pr', 'comment', os.environ['PR_NUMBER'],
            '--repo', os.environ['REPO'], '--body', msg,
        ], check=False)
        PYEOF

    - name: Fail if changes requested
      shell: bash
      run: |
        python3 - <<'PYEOF'
        import json, sys
        try:
            with open('/tmp/review_parsed.json') as f:
                verdict = json.load(f).get('verdict', 'COMMENT')
        except FileNotFoundError:
            sys.exit(0)
        if verdict == 'CHANGES_REQUESTED':
            print("Review verdict: CHANGES_REQUESTED — failing check to block merge.")
            sys.exit(1)
        print(f"Review verdict: {verdict} — check passes.")
        PYEOF
