name: "unifox-ci: PR AI Code Review"
description: >
  Stateful AI code review using Claude. Reads previous bot review threads
  (including resolution status) before calling Claude so it replies to
  existing threads instead of duplicating, and stays consistent across pushes.
  Enforces Odoo coding guidelines and git guidelines.

inputs:
  anthropic_api_key:
    description: "Anthropic API key"
    required: true
  unifox_app_id:
    description: "unifox-ci GitHub App ID"
    required: true
  unifox_private_key:
    description: "unifox-ci GitHub App private key"
    required: true
  base_branch:
    description: "Base branch of the repository"
    required: false
    default: "main"
  profile:
    description: "Repository profile (odoo, default)"
    required: false
    default: "default"

runs:
  using: "composite"
  steps:
    - name: Generate app token
      id: gen-token
      continue-on-error: true
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.unifox_app_id }}
        private-key: ${{ inputs.unifox_private_key }}

    - name: Require app token
      id: token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.gen-token.outputs.token }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        if [ -n "$APP_TOKEN" ]; then
          echo "value=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Token: using GitHub App (unifox-ci[bot])"
          exit 0
        fi
        ORG="${REPO%%/*}"
        INSTALL_URL="https://github.com/apps/unifox-ci"
        SETTINGS_URL="https://github.com/organizations/${ORG}/settings/installations"
        MSG="## ⚠️ unifox-ci not installed\n\nThis workflow requires the **unifox-ci** GitHub App. Without it, CI cannot post review comments or enrichments on this repository.\n\n**To fix:** [Install unifox-ci →](${INSTALL_URL})\nOr enable it for this repo in your [organization app settings](${SETTINGS_URL}).\n\nOnce installed, re-run this workflow."
        gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(echo -e "$MSG")" || true
        echo "ERROR: unifox-ci GitHub App is not installed — install it to unblock CI."
        exit 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install requests

    - name: Collect diff
      shell: bash
      env:
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        git fetch origin "$BASE_BRANCH"

        # Collect diffs in priority order, truncating to 48 KB total.
        # Priority: .py > __manifest__.py > .xml > .yml/.yaml > .sh > rest
        python3 - <<'DIFFEOF'
        import os, subprocess
        from pathlib import Path

        base = os.environ['BASE_BRANCH']

        def diff(patterns):
            # --diff-filter=AM: only Added/Modified files — excludes pure Deletions.
            # This prevents large "extract to separate repo" PRs from consuming the
            # entire budget with removed lines that carry no reviewable new content.
            args = ['git', 'diff', '--diff-filter=AM', f'origin/{base}...HEAD', '--'] + list(patterns)
            r = subprocess.run(args, capture_output=True, text=True)
            return r.stdout

        sections = [
            ('Python files',        diff(['*.py', ':!*/static/*', ':!*/__pycache__/*'])),
            ('Manifest files',      diff(['*/__manifest__.py'])),
            ('XML files',           diff(['*.xml'])),
            ('YAML/config files',   diff(['*.yml', '*.yaml', '.flake8', '.unifox.yml',
                                          '*.cfg', '*.conf', '*.ini'])),
            ('Shell scripts',       diff(['*.sh'])),
            ('Docker files',        diff(['docker-compose*', 'Dockerfile*'])),
            ('Markdown files',      diff(['*.md'])),
        ]

        limit = 48000
        used  = 0
        parts = []
        for label, content in sections:
            if not content.strip():
                continue
            header = f'=== {label} ===\n'
            chunk  = header + content + '\n'
            remaining = limit - used
            if remaining <= len(header) + 10:
                break
            if len(chunk) > remaining:
                chunk = chunk[:remaining] + '\n... (truncated)\n'
            parts.append(chunk)
            used += len(chunk)
            if used >= limit:
                break

        Path('/tmp/review_diff.txt').write_text('\n'.join(parts))
        print(f"Diff collected: {used} bytes across {len(parts)} section(s)")
        DIFFEOF

        BASE_BRANCH="${BASE_BRANCH}" python3 - <<'PYEOF'
        import ast, os, subprocess
        from pathlib import Path

        base = os.environ.get('BASE_BRANCH', 'main')
        result = subprocess.run(
            ['git', 'diff', '--name-only', f'origin/{base}...HEAD', '--',
             '*.py', ':!*/static/*', ':!*/__pycache__/*'],
            capture_output=True, text=True,
        )
        changed = [f for f in result.stdout.strip().splitlines() if f and Path(f).exists()]

        lines = [
            '=== Existing docstring conventions in changed files ===',
            '(Unchanged methods \u2014 these ARE the established convention)',
            '',
        ]

        found = False
        for fpath in changed:
            try:
                src = Path(fpath).read_text()
                tree = ast.parse(src)
                src_lines = src.splitlines()
            except Exception:
                continue
            funcs = []
            for node in ast.walk(tree):
                if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                    body = node.body
                    if (body and isinstance(body[0], ast.Expr)
                            and isinstance(body[0].value, ast.Constant)):
                        doc_lineno = body[0].lineno - 1
                        opening = src_lines[doc_lineno].strip() if doc_lineno < len(src_lines) else ''
                        funcs.append(f'  def {node.name}():  {opening}')
            if funcs:
                found = True
                lines.append(f'File: {fpath}')
                lines.extend(funcs[:25])
                lines.append('')

        if not found:
            lines.append('(no docstrings found in changed files)')

        Path('/tmp/review_conventions.txt').write_text('\n'.join(lines))
        print(f"Convention extraction: {len(changed)} file(s) scanned")
        PYEOF

    - name: Collect existing review context
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess

        repo  = os.environ['REPO']
        pr    = os.environ['PR_NUMBER']
        owner, repo_name = repo.split('/', 1)

        def gh_list(endpoint):
            r = subprocess.run(['gh', 'api', '--paginate', endpoint],
                               capture_output=True, text=True)
            try:
                return json.loads(r.stdout) if r.returncode == 0 and r.stdout.strip() else []
            except Exception:
                return []

        all_reviews  = gh_list(f'repos/{repo}/pulls/{pr}/reviews')
        all_comments = gh_list(f'repos/{repo}/pulls/{pr}/comments')

        bot_reviews  = [r for r in all_reviews  if r.get('user', {}).get('type') == 'Bot']
        bot_comments = [c for c in all_comments if c.get('user', {}).get('type') == 'Bot']

        gql = (
            'query($owner:String!,$repo:String!,$pr:Int!){'
            'repository(owner:$owner,name:$repo){'
            'pullRequest(number:$pr){'
            'reviewThreads(first:100){'
            'nodes{id isResolved '
            'comments(first:10){nodes{databaseId path originalLine}}'
            '}}}}}'
        )
        gql_r = subprocess.run([
            'gh', 'api', 'graphql',
            '-f', f'query={gql}',
            '-f', f'owner={owner}',
            '-f', f'repo={repo_name}',
            '-F', f'pr={int(pr)}',
        ], capture_output=True, text=True)

        c2t = {}
        if gql_r.returncode == 0:
            nodes = (
                (json.loads(gql_r.stdout).get('data') or {})
                .get('repository', {})
                .get('pullRequest', {})
                .get('reviewThreads', {})
                .get('nodes', [])
            )
            for t in nodes:
                for c in t.get('comments', {}).get('nodes', []):
                    c2t[c['databaseId']] = {
                        'thread_id':   t['id'],
                        'is_resolved': t['isResolved'],
                    }

        prev_comments = [{
            'id':          c['id'],
            'path':        c.get('path', ''),
            'line':        c.get('original_line') or c.get('line'),
            'body':        c.get('body', '')[:400],
            'is_resolved': c2t.get(c['id'], {}).get('is_resolved', False),
        } for c in bot_comments]

        # Only APPROVED/CHANGES_REQUESTED reviews can be dismissed via the API.
        # COMMENTED reviews silently fail the dismiss call — filter them out.
        dismissable_ids = [
            r['id'] for r in bot_reviews
            if r.get('state') in ('APPROVED', 'CHANGES_REQUESTED')
        ]

        json.dump({
            'prev_comments':     prev_comments,
            'bot_review_ids':    dismissable_ids,
            'comment_to_thread': {str(k): v for k, v in c2t.items()},
        }, open('/tmp/review_context.json', 'w'), indent=2)

        print(f"Bot reviews: {len(bot_reviews)}, comments: {len(bot_comments)}, threads: {len(c2t)}")
        PYEOF

    - name: Build and run review prompt
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BRANCH: ${{ github.head_ref }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        SCRIPTS_DIR: ${{ github.action_path }}/../../scripts
      run: |
        python3 - <<'PYEOF'
        import json, os

        ctx   = json.load(open('/tmp/review_context.json'))
        diff  = open('/tmp/review_diff.txt').read()
        prev  = ctx['prev_comments']
        try:
            conventions = open('/tmp/review_conventions.txt').read()
        except FileNotFoundError:
            conventions = ''

        pending  = [c for c in prev if not c['is_resolved']]
        resolved = [c for c in prev if c['is_resolved']]

        if prev:
            context_block = '\n'.join([
                f"This is a follow-up review. You previously left {len(prev)} comment(s):",
                "",
                json.dumps(prev, indent=2),
                "",
                f"Pending (unresolved): {len(pending)}",
                f"Already resolved: {len(resolved)}",
                "",
                "FOLLOW-UP RULES \u2014 strictly enforced:",
                "- **MANDATORY**: Generate a reply_to entry for EVERY pending comment above \u2014 no exceptions, no omissions.",
                "  For each comment_id in the pending list: check the current diff and either mark resolved=true (fixed) or resolved=false (still present).",
                "- Pending issue NOW FIXED in the diff below \u2192 reply_to with resolved=true",
                "- Pending issue STILL PRESENT and unchanged \u2192 reply_to with resolved=false; do NOT create a new_comment at that location",
                "- Only genuinely NEW issues (not in the list above) go in new_comments",
                "- NEVER duplicate a new_comment at a (path, line) that already has a pending comment",
                "- NEVER approve while any pending issue remains unresolved",
                "- Be consistent: if code was wrong before and has not changed, it is still wrong",
            ])
        else:
            context_block = "This is the first review of this PR."

        prompt_parts = [
            "You are a senior Odoo developer performing a code review.",
            "The Odoo coding guidelines and git guidelines are already included in your system prompt \u2014 apply them strictly.",
            "",
            f"PR title: {os.environ['PR_TITLE']}",
            f"Branch:   {os.environ['PR_BRANCH']}",
            f"Author:   {os.environ['PR_AUTHOR']}",
            "",
            context_block,
            "",
        ]

        if conventions:
            prompt_parts += [
                conventions,
                "",
                "CONVENTION CHECK \u2014 strictly enforced:",
                "Before flagging ANY formatting or style issue, look for the same pattern in the",
                "'Existing conventions' section above. If an unchanged method uses the same pattern,",
                "it IS the established convention for this codebase \u2014 mark it as correct, not an issue.",
                "This applies to: docstring opening style, Note: self.ensure_one() lines, param/return",
                "formatting, or any other style detail that appears in at least one existing method.",
                "",
            ]

        prompt_parts += [
            "Current diff (first 48 KB):",
            "```diff",
            diff,
            "```",
            "",
            "Review checklist (apply Odoo coding guidelines strictly for each point):",
            "1. Correctness: logic bugs, wrong Odoo API usage, missing super() calls in CRUD overrides",
            "2. Security: SQL injection, unsafe eval(), unescaped user input in XML/QWeb",
            "3. Odoo model conventions (flag as CHANGES_REQUESTED):",
            "   - Wrong attribute order: _name/_description must come before fields",
            "   - Field suffixes: Many2one must end in _id, One2many/Many2many in _ids",
            "   - compute methods must be named _compute_<field_name>",
            "   - onchange methods must be named _onchange_<field_name>",
            "   - constraint methods must be named _check_<name>",
            "   - action methods (called from buttons) must call self.ensure_one()",
            "   - Imports must follow order: stdlib \u2192 odoo \u2192 third-party addons",
            "   - No cr.commit() without explicit justification in a comment",
            "   - No bare except Exception without savepoints",
            "   - No _() around strings with % or .format() interpolation inside the call",
            "4. XML conventions (flag as CHANGES_REQUESTED):",
            "   - XML IDs must follow pattern: <module>.<model>_view_<type>",
            "   - No hardcoded IDs; use ref() for cross-module references",
            "5. Test coverage: missing tests for new public methods or new code paths",
            "6. Manifest: version bump, correct depends, all new files listed in data/assets",
            "7. Performance: N+1 queries, missing sudo() where appropriate, unnecessary iterations",
            "8. Field naming: custom fields must use module prefix (e.g. bancard_public_key)",
            "9. YAML workflow files (.github/workflows/*.yml):",
            "   - Secret names must match org standard: UNIFOX_CI_APP_ID, UNIFOX_CI_PRIVATE_KEY, ANTHROPIC_API_KEY",
            "   - Action refs must be consistent (@main or a pinned version, not mixed)",
            "   - permissions blocks must be minimal (only what the job actually needs)",
            "   - Workflow triggers must make sense for the job's purpose",
            "   - Flag any hardcoded values that should be secrets or inputs",
            "10. docker-compose and Dockerfile:",
            "    - No hardcoded credentials or sensitive values",
            "    - Volume mounts must make sense and not expose the host unnecessarily",
            "    - Flag deprecated syntax",
            "11. Shell scripts (.sh):",
            "    - Missing error handling: scripts must start with 'set -e' and 'set -o pipefail' (or equivalent)",
            "    - Commands that can fail silently (pipes without error propagation)",
            "    - Variables must be quoted to avoid word splitting",
            "12. .unifox.yml and other config files:",
            "    - Required fields must be present",
            "    - Values must be consistent with the repo's actual structure",
            "",
            'Output ONLY a valid JSON object:',
            '{',
            '  "verdict": "APPROVED" | "CHANGES_REQUESTED" | "COMMENT",',
            '  "summary": "1-3 sentence cumulative summary. If follow-up: mention resolved vs pending count.",',
            '  "new_comments": [{"path": "file.py", "line": 42, "body": "Issue"}],',
            '  "reply_to": [{"comment_id": 123456, "body": "Reply text", "resolved": true}]',
            '}',
            "",
            "Rules:",
            "- verdict=APPROVED only if zero pending issues and no new blocking issues",
            "- verdict=CHANGES_REQUESTED if any item from checklist points 1-4 is violated",
            "- verdict=COMMENT for non-blocking suggestions only",
            "- new_comments: max 8 items, new issues only",
            "- reply_to: one entry per previous comment that needs follow-up action",
            "- All text in English \u2014 no markdown fences outside the JSON",
            "- PR title scope may be a directory path such as '.github' or 'unifica_payment' \u2014 do NOT flag dots or underscores in scope names as invalid",
        ]

        # Auto-approve only when the diff is genuinely empty (no files of any type changed)
        # and there are no prior pending issues. YAML, shell, docker, config files all
        # warrant a real review — only skip Claude when there is truly nothing to review.
        if not diff.strip() and not pending:
            import json as _json
            _json.dump({
                'verdict': 'APPROVED',
                'summary': 'No changes detected in this PR. Automatically approved.',
                'new_comments': [],
                'reply_to': [],
            }, open('/tmp/review_parsed.json', 'w'))
            print("Diff is genuinely empty and no pending issues — auto-approved, skipping Claude call")
        else:
            prompt_text = '\n'.join(prompt_parts)
            open('/tmp/review_prompt.txt', 'w').write(prompt_text)
            print(f"Prompt written ({len(prompt_text)} chars), follow-up={bool(prev)}")

        PYEOF

        if [ ! -f /tmp/review_parsed.json ]; then
          python "${SCRIPTS_DIR}/claude_api.py" < /tmp/review_prompt.txt > /tmp/review_raw.json
        fi

        python3 - <<'PYEOF'
        import json, os

        # Skip parsing if auto-approved path already wrote the parsed file
        if os.path.exists('/tmp/review_parsed.json'):
            data = json.load(open('/tmp/review_parsed.json'))
            print(f"Using pre-built result: {data['verdict']}")
        else:
            raw = open('/tmp/review_raw.json').read().strip()
            if raw.startswith('```'):
                raw = raw.split('\n', 1)[1].rsplit('```', 1)[0].strip()
            try:
                data = json.loads(raw)
            except json.JSONDecodeError as e:
                print(f"Warning: could not parse response ({e}) — safe fallback")
                data = {'verdict': 'COMMENT', 'summary': 'Review parse error.', 'new_comments': [], 'reply_to': []}

        if 'veredicto' in data and 'verdict' not in data:
            data['verdict'] = data.pop('veredicto')
        if data.get('verdict') not in ('APPROVED', 'CHANGES_REQUESTED', 'COMMENT'):
            data['verdict'] = 'COMMENT'
        data.setdefault('new_comments', [])
        data.setdefault('reply_to', [])

        json.dump(data, open('/tmp/review_parsed.json', 'w'), indent=2)
        print(f"Verdict: {data['verdict']}, new_comments: {len(data['new_comments'])}, reply_to: {len(data['reply_to'])}")
        PYEOF

    - name: Execute review actions
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        SHA: ${{ github.event.pull_request.head.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess, sys

        ctx  = json.load(open('/tmp/review_context.json'))
        data = json.load(open('/tmp/review_parsed.json'))
        repo = os.environ['REPO']
        pr   = os.environ['PR_NUMBER']
        sha  = os.environ['SHA']
        c2t  = {int(k): v for k, v in ctx['comment_to_thread'].items()}

        def gh(endpoint, body=None, method=None):
            cmd = ['gh', 'api']
            if method:
                cmd += ['--method', method]
            if body is not None:
                cmd += ['--input', '-']
            cmd.append(endpoint)
            kw = {'capture_output': True, 'text': True}
            if body is not None:
                kw['input'] = json.dumps(body)
            return subprocess.run(cmd, **kw)

        errors = []

        for reply in data.get('reply_to', []):
            cid  = reply.get('comment_id')
            body = reply.get('body', '').strip()
            if not cid or not body:
                continue
            r = gh(f'repos/{repo}/pulls/comments/{cid}/replies',
                   body={'body': body}, method='POST')
            if r.returncode != 0:
                errors.append(f'reply {cid}: {r.stderr[:120]}')
                continue
            print(f'Replied to comment {cid}')

            if reply.get('resolved') and cid in c2t:
                tid = c2t[cid]['thread_id']
                gql = ('mutation($id:ID!){resolveReviewThread(input:{threadId:$id})'
                       '{thread{id isResolved}}}')
                r2 = subprocess.run(
                    ['gh', 'api', 'graphql', '-f', f'query={gql}', '-f', f'id={tid}'],
                    capture_output=True, text=True)
                if r2.returncode != 0:
                    errors.append(f'resolve thread {tid}: {r2.stderr[:120]}')
                else:
                    print(f'Resolved thread for comment {cid}')

        for rid in ctx.get('bot_review_ids', []):
            r = gh(f'repos/{repo}/pulls/{pr}/reviews/{rid}/dismissals',
                   body={'message': 'Superseded by updated review'}, method='PUT')
            if r.returncode != 0:
                print(f'Warning: could not dismiss review {rid}')

        prev        = ctx.get('prev_comments', [])
        pending_ids = {c['id'] for c in prev if not c['is_resolved']}
        was_pending = len(pending_ids)

        # Auto-resolve: pending threads not explicitly carried forward as still-pending.
        # Claude is instructed to generate reply_to for every pending comment, but as a
        # safety net we resolve any it silently omitted (avoids comment accumulation).
        explicitly_still_pending = {
            r['comment_id'] for r in data.get('reply_to', [])
            if not r.get('resolved', True)
        }
        auto_resolved = 0
        for comment in prev:
            cid = comment['id']
            if comment['is_resolved'] or cid in explicitly_still_pending:
                continue
            if cid in {r.get('comment_id') for r in data.get('reply_to', []) if r.get('resolved')}:
                continue  # already handled in the reply_to loop above
            tid = c2t.get(cid, {}).get('thread_id')
            if not tid:
                print(f'Warning: no thread_id mapping for comment {cid} — cannot auto-resolve')
                continue
            r_reply = gh(
                f'repos/{repo}/pulls/comments/{cid}/replies',
                body={'body': '\u2705 Resolved \u2014 not present in the latest diff.'},
                method='POST',
            )
            if r_reply.returncode == 0:
                gql = ('mutation($id:ID!){resolveReviewThread(input:{threadId:$id})'
                       '{thread{id isResolved}}}')
                gql_r = subprocess.run(
                    ['gh', 'api', 'graphql', '-f', f'query={gql}', '-f', f'id={tid}'],
                    capture_output=True, text=True,
                )
                if gql_r.returncode == 0:
                    auto_resolved += 1
                    print(f'Auto-resolved thread for comment {cid}')
                else:
                    print(f'Warning: could not resolve thread {tid}: {gql_r.stderr.strip()}')
        if auto_resolved:
            print(f'Auto-resolved {auto_resolved} thread(s) not carried forward by Claude')

        # Only count as "newly done" comments that were actually pending before this review.
        # Avoids double-counting threads that were resolved externally (e.g. via GraphQL)
        # before the review ran — those are already in the already-resolved count.
        newly_done  = sum(1 for re in data.get('reply_to', [])
                          if re.get('resolved') and re.get('comment_id') in pending_ids)
        newly_done += auto_resolved
        now_pending = max(0, was_pending - newly_done)
        now_resolved = sum(1 for c in prev if c['is_resolved']) + newly_done
        new_count   = len([c for c in data.get('new_comments', [])
                           if c.get('path') and isinstance(c.get('line'), int)])

        parts = []
        if now_resolved:
            parts.append(f'{now_resolved} resolved')
        if now_pending:
            parts.append(f'{now_pending} pending')
        if new_count:
            parts.append(f'{new_count} new')
        status = ' \u00b7 '.join(parts) if parts else 'No issues found'

        rev_body = '\n'.join([
            '<!-- unifox-review -->',
            '',
            data.get('summary', ''),
            '',
            f'**Issues:** {status}',
        ])

        event_map = {
            'APPROVED':          'APPROVE',
            'CHANGES_REQUESTED': 'REQUEST_CHANGES',
            'COMMENT':           'COMMENT',
        }
        event  = event_map.get(data.get('verdict', 'COMMENT'), 'COMMENT')
        inline = [
            {'path': c['path'], 'line': c['line'], 'body': c['body'], 'side': 'RIGHT'}
            for c in data.get('new_comments', [])
            if c.get('path') and isinstance(c.get('line'), int) and c.get('body')
        ]

        payload = {'commit_id': sha, 'body': rev_body, 'event': event, 'comments': inline}
        r = gh(f'repos/{repo}/pulls/{pr}/reviews', body=payload, method='POST')
        if r.returncode != 0:
            # Inline comments were rejected (line numbers not in diff).
            # Rebuild the body without the inline count so the summary is accurate.
            fb_parts = []
            if now_resolved:
                fb_parts.append(f'{now_resolved} resolved')
            if now_pending:
                fb_parts.append(f'{now_pending} pending')
            fb_status = ' \u00b7 '.join(fb_parts) if fb_parts else 'No issues found'
            note = ''
            if inline:
                note = (f'\n\n_Note: {len(inline)} suggestion(s) could not be attached as inline '
                        f'comments (line numbers not present in diff). See summary above._')
            fallback_body = '\n'.join([
                '<!-- unifox-review -->',
                '',
                data.get('summary', '') + note,
                '',
                f'**Issues:** {fb_status}',
            ])
            payload['comments'] = []
            payload['body'] = fallback_body
            r2 = gh(f'repos/{repo}/pulls/{pr}/reviews', body=payload, method='POST')
            if r2.returncode != 0:
                print(f'Error creating review: {r2.stderr}')
                sys.exit(1)
            print(f'Review submitted (no inline comments \u2014 line mismatch): {event}')
        else:
            print(f'Review submitted: {event}, {len(inline)} inline comments')

        if errors:
            print(f'Non-fatal errors ({len(errors)}): {errors}')
        PYEOF

    - name: Tag author if changes requested
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess, sys

        try:
            data = json.load(open('/tmp/review_parsed.json'))
            ctx  = json.load(open('/tmp/review_context.json'))
        except Exception:
            sys.exit(0)

        if data.get('verdict') != 'CHANGES_REQUESTED':
            sys.exit(0)

        prev       = ctx.get('prev_comments', [])
        newly_done = sum(1 for r in data.get('reply_to', []) if r.get('resolved'))
        pending    = max(0, sum(1 for c in prev if not c['is_resolved']) - newly_done)
        new_cnt    = len(data.get('new_comments', []))
        total      = pending + new_cnt

        msg = (f"@{os.environ['PR_AUTHOR']} unifox-ci has requested changes "
               f"({total} issue(s) pending). Please review the inline comments.")
        subprocess.run([
            'gh', 'pr', 'comment', os.environ['PR_NUMBER'],
            '--repo', os.environ['REPO'], '--body', msg,
        ], check=False)
        PYEOF
