name: "unifox-ci: Release Proposal"
description: >
  Analyzes commits since the last release tag, asks Claude for the correct
  semver bump, posts a proposal comment on the associated PR, and outputs
  proposed_tag + pr_number for the environment-gated release job.

inputs:
  anthropic_api_key:
    description: "Anthropic API key"
    required: true
  unifox_app_id:
    description: "unifox-ci GitHub App ID"
    required: true
  unifox_private_key:
    description: "unifox-ci GitHub App private key"
    required: true
  tag_prefix:
    description: "Tag style: 'semver' (v1.2.3) or 'odoo' (branch-scoped, e.g. 19.0-v1.2.3)"
    required: false
    default: "semver"
  odoo_version:
    description: "Odoo major branch (e.g. '19.0'). Only used when tag_prefix=odoo."
    required: false
    default: "19.0"
  base_branch:
    description: "Branch being released"
    required: false
    default: "main"

outputs:
  proposed_tag:
    description: "Proposed release tag (passed to the release job)"
    value: ${{ steps.comment.outputs.proposed_tag }}
  pr_number:
    description: "PR number associated with this push (empty if none)"
    value: ${{ steps.comment.outputs.pr_number }}

runs:
  using: "composite"
  steps:
    - name: Generate app token
      id: gen-token
      continue-on-error: true
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.unifox_app_id }}
        private-key: ${{ inputs.unifox_private_key }}

    - name: Require app token
      id: token
      shell: bash
      env:
        APP_TOKEN: ${{ steps.gen-token.outputs.token }}
        REPO: ${{ github.repository }}
      run: |
        if [ -n "$APP_TOKEN" ]; then
          echo "value=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Token: using GitHub App (unifox-ci[bot])"
          exit 0
        fi
        ORG="${REPO%%/*}"
        echo "ERROR: unifox-ci GitHub App is not installed on this repository."
        echo "Install it at https://github.com/apps/unifox-ci"
        echo "or enable it for this repository at https://github.com/organizations/${ORG}/settings/installations"
        exit 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: pip install requests

    - name: Detect last release tag
      id: last-tag
      shell: bash
      env:
        TAG_PREFIX: ${{ inputs.tag_prefix }}
        ODOO_VERSION: ${{ inputs.odoo_version }}
      run: |
        if [ "$TAG_PREFIX" = "odoo" ]; then
          PATTERN="${ODOO_VERSION}-v[0-9]*.[0-9]*.[0-9]*"
        else
          PATTERN="v[0-9]*.[0-9]*.[0-9]*"
        fi
        LAST=$(git tag --list "$PATTERN" --sort=-version:refname | head -1)
        if [ -z "$LAST" ]; then
          echo "No previous release tag found — this is the first release."
          echo "last_tag=" >> "$GITHUB_OUTPUT"
          echo "is_first=true" >> "$GITHUB_OUTPUT"
        else
          echo "Last release tag: $LAST"
          echo "last_tag=${LAST}" >> "$GITHUB_OUTPUT"
          echo "is_first=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Collect commits since last release
      shell: bash
      env:
        LAST_TAG: ${{ steps.last-tag.outputs.last_tag }}
        IS_FIRST: ${{ steps.last-tag.outputs.is_first }}
      run: |
        if [ "$IS_FIRST" = "true" ]; then
          git log HEAD --pretty=format:"%H|%s|%an|%ad" --date=short \
            > /tmp/release_commits.txt
        else
          git log "${LAST_TAG}..HEAD" --pretty=format:"%H|%s|%an|%ad" --date=short \
            > /tmp/release_commits.txt
        fi
        echo "Commits to analyze: $(wc -l < /tmp/release_commits.txt)"

    - name: Collect Odoo module versions
      if: inputs.tag_prefix == 'odoo'
      shell: bash
      run: |
        python3 - <<'PYEOF'
        import re, json
        from pathlib import Path
        versions = {}
        for manifest in sorted(Path('.').glob('unifica_*/__manifest__.py')):
            module = manifest.parent.name
            content = manifest.read_text()
            m = re.search(r"['\"]version['\"]\s*:\s*['\"]([^'\"]+)['\"]", content)
            if m:
                versions[module] = m.group(1)
        json.dump(versions, open('/tmp/module_versions.json', 'w'), indent=2)
        print(json.dumps(versions, indent=2))
        PYEOF

    - name: Ask Claude for version bump
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        TAG_PREFIX: ${{ inputs.tag_prefix }}
        ODOO_VERSION: ${{ inputs.odoo_version }}
        LAST_TAG: ${{ steps.last-tag.outputs.last_tag }}
        IS_FIRST: ${{ steps.last-tag.outputs.is_first }}
        SCRIPTS_DIR: ${{ github.action_path }}/../../scripts
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess

        tag_prefix  = os.environ['TAG_PREFIX']
        odoo_ver    = os.environ['ODOO_VERSION']
        last_tag    = os.environ['LAST_TAG']
        is_first    = os.environ['IS_FIRST'] == 'true'
        scripts_dir = os.environ['SCRIPTS_DIR']

        commits_raw = open('/tmp/release_commits.txt').read().strip() or '(no commits found)'
        current_version = 'none — first release' if is_first else last_tag

        if tag_prefix == 'odoo':
            try:
                mod_versions = json.load(open('/tmp/module_versions.json'))
                mod_ver_text = json.dumps(mod_versions, indent=2)
            except FileNotFoundError:
                mod_ver_text = '(none found)'
            branch_context = (
                f"Branch: {odoo_ver} — this version prefix scopes all tags for this Odoo major release.\n"
                f"Current Odoo module versions:\n{mod_ver_text}\n"
            )
            new_tag_example   = f"{odoo_ver}-v1.2.3"
            float_tag_example = f"{odoo_ver}-v1"
            latest_example    = f"{odoo_ver}-latest"
        else:
            branch_context    = ""
            new_tag_example   = "v1.2.3"
            float_tag_example = "v1"
            latest_example    = "latest"

        prompt_parts = [
            'You are a versioning assistant for a software system. Analyze these '
            'commits and determine the correct semantic version bump for the SYSTEM '
            'as a whole (not individual modules).',
            '',
            f'Tag style: {tag_prefix}',
            f'Current system version: {current_version}',
        ]
        if branch_context:
            prompt_parts.append(branch_context.rstrip())
        prompt_parts += [
            'Commits since last system release (format: SHA|subject|author|date):',
            commits_raw,
            '',
            'Bump rules:',
            '- patch (Z): bug fixes, docs, CI changes, minor improvements',
            '- minor (Y): new features, new modules, significant improvements',
            '- major (X): breaking changes, major architectural changes, dropping support for something',
            '',
            f'For odoo style, only bump the semver segment (X.Y.Z) of {odoo_ver}-vX.Y.Z.',
            f'The branch prefix ({odoo_ver}) never changes — it identifies the Odoo major release line.',
            'If this is the first release, start from v0.1.0 for minor features or v1.0.0 for a stable release.',
            '',
            'Output ONLY a valid JSON object:',
            '{',
            f'  "new_tag": "{new_tag_example}",',
            '  "bump_type": "patch|minor|major",',
            f'  "floating_tag": "{float_tag_example}",',
            f'  "latest_tag": "{latest_example}",',
            '  "reasoning": "one line explanation",',
            '  "changelog_sections": {',
            '    "New features": [],',
            '    "Improvements": [],',
            '    "Bug fixes": [],',
            '    "Infrastructure/CI": [],',
            '    "Other": []',
            '  },',
            '  "release_summary": "2-3 sentence summary of this system release"',
            '}',
            'Omit empty arrays from changelog_sections.',
            'No markdown fences, no explanation outside the JSON.',
        ]
        prompt = '\n'.join(prompt_parts)

        result = subprocess.run(
            ['python3', f'{scripts_dir}/claude_api.py', prompt],
            capture_output=True, text=True,
        )
        raw = result.stdout.strip()
        if raw.startswith('```'):
            raw = raw.split('\n', 1)[1].rsplit('```', 1)[0].strip()
        try:
            data = json.loads(raw)
        except json.JSONDecodeError as e:
            print(f"Parse error: {e}\nRaw: {raw[:500]}")
            raise SystemExit(1)

        json.dump(data, open('/tmp/release_parsed.json', 'w'), indent=2)
        print(f"Proposed tag: {data['new_tag']}  ({data['bump_type']})")
        print(f"Reasoning:    {data['reasoning']}")
        PYEOF

    - name: Post PR comment and write outputs
      id: comment
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.value }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        TAG_PREFIX: ${{ inputs.tag_prefix }}
        LAST_TAG: ${{ steps.last-tag.outputs.last_tag }}
        BASE_BRANCH: ${{ inputs.base_branch }}
      run: |
        python3 - <<'PYEOF'
        import json, os, subprocess, sys

        try:
            data = json.load(open('/tmp/release_parsed.json'))
        except FileNotFoundError:
            print("ERROR: /tmp/release_parsed.json not found — 'Ask Claude for version bump' step likely failed.")
            sys.exit(1)

        repo        = os.environ['REPO']
        sha         = os.environ['SHA']
        run_url     = os.environ['RUN_URL']
        tag_prefix  = os.environ['TAG_PREFIX']
        last_tag    = os.environ.get('LAST_TAG') or '(none — first release)'
        base_branch = os.environ.get('BASE_BRANCH', 'main')
        gh_token    = os.environ['GH_TOKEN']
        env         = {**os.environ, 'GH_TOKEN': gh_token}

        new_tag   = data['new_tag']
        bump_type = data['bump_type']
        reasoning = data['reasoning']

        # Find PR associated with this commit
        pr_r = subprocess.run(
            ['gh', 'api', f'repos/{repo}/commits/{sha}/pulls',
             '--header', 'Accept: application/vnd.github.v3+json'],
            capture_output=True, text=True, env=env,
        )
        if pr_r.returncode != 0:
            print(f"Warning: could not fetch associated PRs: {pr_r.stderr.strip()}")
            prs = []
        else:
            try:
                prs = json.loads(pr_r.stdout or '[]')
            except json.JSONDecodeError as e:
                print(f"Warning: could not parse PR list response: {e}")
                prs = []
        # Filter to PRs targeting the release branch to avoid picking the wrong PR
        # when a commit has been cherry-picked or backported to multiple PRs.
        matching = [p for p in prs if p.get('base', {}).get('ref') == base_branch]
        if not matching and prs:
            print(f"Warning: none of the {len(prs)} associated PR(s) targets '{base_branch}' — "
                  f"using first PR as fallback. PRs found: {[p['number'] for p in prs]}")
            matching = prs[:1]
        pr_number = str(matching[0]['number']) if matching else ''
        print(f'Associated PR: #{pr_number}' if pr_number else 'No associated PR found')

        # Build changelog markdown
        changelog_lines = []
        for section in ['New features', 'Improvements', 'Bug fixes', 'Infrastructure/CI', 'Other']:
            items = data.get('changelog_sections', {}).get(section, [])
            if not items:
                continue
            changelog_lines += [f'### {section}', '']
            changelog_lines += [f'- {item}' for item in items]
            changelog_lines.append('')
        changelog_md = '\n'.join(changelog_lines).strip() or '_No changes recorded._'

        # Build module versions table (odoo only)
        module_table = ''
        if tag_prefix == 'odoo':
            try:
                mods = json.load(open('/tmp/module_versions.json'))
                if mods:
                    rows = '\n'.join(f'| `{m}` | `{v}` |' for m, v in sorted(mods.items()))
                    module_table = (
                        '\n---\n\n## Module versions at this release\n\n'
                        '| Module | Version |\n|--------|----------|\n'
                        f'{rows}\n'
                    )
            except FileNotFoundError:
                pass

        # Build comment body as list to avoid column-1 content in YAML
        body_parts = [
            '<!-- unifox-release-proposal -->',
            '',
            '\U0001f98a unifox-ci \u2014 Release Proposal',
            '',
            f'**Proposed version:** `{new_tag}`  |  **Bump:** {bump_type}  |  **From:** `{last_tag}`',
            '',
            f'> {reasoning}',
            '',
            '---',
            '',
            '## Changelog',
            '',
            changelog_md,
        ]
        if module_table:
            body_parts.append(module_table)
        body_parts += [
            '',
            '---',
            '',
            f'\u23f3 **Pending approval** \u2014 A maintainer must approve the release'
            f' in [GitHub Actions]({run_url}) to proceed.',
            'The release will be created automatically upon approval.',
        ]
        body = '\n'.join(body_parts)

        # Post comment on PR if one was found
        if pr_number:
            import tempfile
            # delete=False so the path remains valid after close(); finally cleans up.
            tmp = tempfile.NamedTemporaryFile(mode='w', suffix='.json', delete=False)
            try:
                json.dump({'body': body}, tmp)
                tmp.flush()
                tmp.close()
                r_comment = subprocess.run([
                    'gh', 'api', '--method', 'POST',
                    f'repos/{repo}/issues/{pr_number}/comments',
                    '--input', tmp.name,
                ], env=env, capture_output=True, text=True)
            finally:
                from pathlib import Path
                Path(tmp.name).unlink(missing_ok=True)
            if r_comment.returncode != 0:
                print(f'Warning: could not post proposal comment on PR #{pr_number}: '
                      f'{r_comment.stderr.strip()}')
            else:
                print(f'Posted proposal comment on PR #{pr_number}')
        else:
            print('Skipping PR comment — no associated PR for this push')

        # Write action outputs
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'proposed_tag={new_tag}\n')
            f.write(f'pr_number={pr_number}\n')
        PYEOF
